<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my time ✧ Memento Mori</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Cinzel:wght@400;500;600;700&family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --deep-space: #0a0a14;
            --star-gold: #d4a853;
            --glass-blur: blur(10px);
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', 'Cormorant Garamond', sans-serif;
            min-height: 100vh;
            background: #0a0a14;
            color: #e8e4f0;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── لایه پس‌زمینه ─── */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 1.5s ease-in-out;
        }
        .bg-layer.layer-a {
            z-index: -3;
            opacity: 1;
        }
        .bg-layer.layer-b {
            z-index: -2;
            opacity: 0;
        }
        .bg-layer.fading-out {
            opacity: 0;
        }
        .bg-layer.fading-in {
            opacity: 1;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at center,
                    rgba(10, 10, 25, 0.3) 0%,
                    rgba(5, 5, 18, 0.5) 40%,
                    rgba(2, 2, 10, 0.72) 100%);
            pointer-events: none;
        }

        /* ─── ذرات کیهانی ─── */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* ─── دکمه موزیک (شیک و کوچک) ─── */
        .music-toggle {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 100;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(18, 18, 42, 0.55);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(180, 160, 130, 0.35);
            color: #d4a853;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.5);
            outline: none;
            user-select: none;
        }
        .music-toggle:hover {
            border-color: rgba(212, 168, 83, 0.7);
            box-shadow: 0 4px 26px rgba(180, 140, 70, 0.3);
            transform: scale(1.08);
        }
        .music-toggle.playing {
            animation: musicPulse 2s ease-in-out infinite;
        }
        @keyframes musicPulse {
            0%,
            100% {
                box-shadow: 0 4px 18px rgba(0, 0, 0, 0.5);
            }
            50% {
                box-shadow: 0 4px 22px rgba(212, 168, 83, 0.5);
            }
        }

        /* ─── کانتینر اصلی ─── */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
            padding: 16px 20px 30px;
        }

        /* ─── هدر و لوگو ─── */
        .header {
            text-align: center;
            padding: 20px 20px 10px;
        }
        .logo-text {
            font-family: 'Playfair Display', 'Cinzel', serif;
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 5px;
            background: linear-gradient(180deg, #f0e0c0 0%, #d4a853 35%, #b8923e 60%, #d4a853 80%, #f0e0c0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            filter: drop-shadow(0 3px 12px rgba(180, 140, 70, 0.55));
            font-style: italic;
            line-height: 1.1;
            animation: logoGlow 4s ease-in-out infinite;
        }
        @keyframes logoGlow {
            0%,
            100% {
                filter: drop-shadow(0 3px 12px rgba(180, 140, 70, 0.55));
            }
            50% {
                filter: drop-shadow(0 3px 24px rgba(212, 168, 83, 0.85));
            }
        }
        .logo-subtitle {
            font-family: 'Playfair Display', 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            letter-spacing: 7px;
            color: #b8a080;
            text-transform: uppercase;
            margin-top: 0px;
            font-style: italic;
            font-weight: 500;
        }
        .logo-divider {
            width: 120px;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, #d4a853, transparent);
            margin: 8px auto 0;
            border-radius: 2px;
        }

        /* ─── باکس نقل‌قول لاکچری (بالا، کشیده) ─── */
        .quote-section {
            margin: 18px auto 14px;
            text-align: center;
            padding: 0 8px;
        }
        .quote-container {
            display: block;
            width: 100%;
            max-width: 100%;
            background: rgba(16, 16, 36, 0.45);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(180, 150, 110, 0.25);
            border-radius: 12px;
            padding: 14px 24px;
            transition: all 0.6s ease;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.35);
            position: relative;
            overflow: hidden;
        }
        .quote-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 168, 83, 0.5), transparent);
        }
        .quote-container:hover {
            border-color: rgba(200, 170, 130, 0.5);
            box-shadow: 0 6px 36px rgba(100, 130, 200, 0.15);
        }
        .quote-text {
            font-family: 'Vazirmatn', 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            font-style: italic;
            color: #e8e0d8;
            letter-spacing: 0.4px;
            line-height: 1.8;
            transition: opacity 0.4s ease;
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .quote-fade {
            animation: quoteFadeIn 0.5s ease;
        }
        @keyframes quoteFadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .quote-counter {
            font-size: 0.6rem;
            color: #887766;
            letter-spacing: 2px;
            margin-top: 4px;
            opacity: 0.55;
        }

        /* ─── شبکه ساعت‌ها (کوچک‌تر و جمع‌وجور) ─── */
        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 8px;
            padding: 0 4px;
        }

        .clock-card {
            position: relative;
            border-radius: 14px;
            padding: 12px 8px 10px;
            text-align: center;
            transition: all var(--transition-smooth);
            cursor: default;
            overflow: hidden;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            min-height: 105px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 3px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }

        .clock-card.day-mode {
            background: linear-gradient(135deg,
                    rgba(255, 252, 248, 0.55) 0%,
                    rgba(240, 235, 225, 0.45) 30%,
                    rgba(255, 250, 242, 0.6) 70%,
                    rgba(245, 238, 228, 0.5) 100%);
            border: 1px solid rgba(200, 180, 140, 0.5);
            color: #1a1a2e;
        }
        .clock-card.night-mode {
            background: linear-gradient(135deg,
                    rgba(10, 10, 28, 0.55) 0%,
                    rgba(6, 6, 20, 0.45) 30%,
                    rgba(14, 14, 32, 0.6) 70%,
                    rgba(8, 8, 24, 0.5) 100%);
            border: 1px solid rgba(120, 150, 210, 0.35);
            color: #e8e4f0;
        }
        .clock-card.day-mode .city-name {
            color: #3a3028;
        }
        .clock-card.night-mode .city-name {
            color: #c8d8f0;
        }
        .clock-card.day-mode .time-display {
            color: #1a1a2e;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 8px;
            padding: 2px 8px;
        }
        .clock-card.night-mode .time-display {
            color: #f0ecff;
            text-shadow: 0 0 12px rgba(150, 180, 230, 0.4);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 2px 8px;
        }
        .clock-card.day-mode .country-name {
            color: #6b5d4f;
        }
        .clock-card.night-mode .country-name {
            color: #8899bb;
        }
        .clock-card.day-mode .date-display {
            color: #5a4e42;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 6px;
            padding: 1px 6px;
        }
        .clock-card.night-mode .date-display {
            color: #8899bb;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            padding: 1px 6px;
        }
        .clock-card.day-mode .daynight-indicator {
            background: rgba(255, 245, 230, 0.7);
            color: #8b6914;
            border: 1px solid #e8d5a3;
        }
        .clock-card.night-mode .daynight-indicator {
            background: rgba(20, 20, 45, 0.7);
            color: #aac4ee;
            border: 1px solid #334466;
        }

        .clock-card:hover {
            transform: translateY(-3px);
            z-index: 5;
        }
        .clock-card.day-mode:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(220, 190, 140, 0.4) inset;
        }
        .clock-card.night-mode:hover {
            box-shadow: 0 8px 30px rgba(80, 130, 210, 0.25),
                0 0 0 1px rgba(130, 160, 220, 0.35) inset;
        }

        .city-name {
            font-family: 'Playfair Display', 'Vazirmatn', serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .time-display {
            font-family: 'Cinzel', 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.1;
        }
        .country-name {
            font-family: 'Cormorant Garamond', 'Vazirmatn', serif;
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-style: italic;
            opacity: 0.75;
        }
        .date-display {
            font-family: 'Vazirmatn', 'Cormorant Garamond', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.3px;
            opacity: 0.7;
            direction: ltr;
            display: inline-block;
        }
        .date-display .shamsi-date {
            display: block;
            font-size: 0.55rem;
            opacity: 0.65;
            margin-top: 1px;
        }
        .daynight-indicator {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 0.6rem;
            letter-spacing: 0.8px;
            font-weight: 500;
        }
        .daynight-icon {
            font-size: 0.85rem;
        }

        /* کارت ایران */
        .clock-card.iran-featured {
            border: 1.5px solid rgba(212, 168, 83, 0.55) !important;
            box-shadow: 0 0 18px rgba(212, 168, 83, 0.2) !important;
        }

        /* ─── فوتر ─── */
        .footer {
            text-align: center;
            padding: 14px;
            font-size: 0.62rem;
            color: #665544;
            letter-spacing: 2px;
            opacity: 0.45;
            font-family: 'Cormorant Garamond', serif;
            margin-top: 12px;
        }

        /* ─── ریسپانسیو ─── */
        @media (max-width: 1200px) {
            .clocks-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            .logo-text {
                font-size: 2.6rem;
            }
            .time-display {
                font-size: 1.3rem;
            }
        }
        @media (max-width: 900px) {
            .clocks-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .time-display {
                font-size: 1.2rem;
            }
            .logo-text {
                font-size: 2.2rem;
            }
        }
        @media (max-width: 600px) {
            .clocks-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
            }
            .clock-card {
                padding: 8px 4px 6px;
                min-height: 85px;
                border-radius: 10px;
            }
            .time-display {
                font-size: 1rem;
            }
            .city-name {
                font-size: 0.7rem;
            }
            .country-name {
                font-size: 0.55rem;
            }
            .logo-text {
                font-size: 1.8rem;
            }
            .quote-text {
                font-size: 1rem;
            }
            .music-toggle {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
                bottom: 16px;
                left: 16px;
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a18;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3040;
            border-radius: 2px;
        }

        .bg-fallback {
            background: radial-gradient(ellipse at 30% 40%, #1a1030 0%, #0a0a18 50%, #020210 100%) !important;
        }
    </style>
</head>
<body>

    <!-- موزیک پس‌زمینه -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://dl.musicviral.ir/Music/04-04/Emilio%20Piano%20x%20Lucie%20-%20Maison.mp3" type="audio/mpeg">
    </audio>

    <!-- دکمه قطع/پخش موزیک -->
    <button class="music-toggle playing" id="musicToggle" title="پخش/قطع موسیقی">♪</button>

    <!-- لایه‌های پس‌زمینه -->
    <div class="bg-layer layer-a" id="bgLayerA"></div>
    <div class="bg-layer layer-b" id="bgLayerB"></div>
    <div class="bg-overlay"></div>

    <!-- ذرات کیهانی -->
    <canvas id="particles-canvas"></canvas>

    <!-- کانتینر اصلی -->
    <div class="main-container">

        <!-- هدر و لوگو -->
        <header class="header">
            <h1 class="logo-text">my time</h1>
            <p class="logo-subtitle">Memento Mori</p>
            <div class="logo-divider"></div>
        </header>

        <!-- باکس نقل‌قول لاکچری (بالا) -->
        <div class="quote-section">
            <div class="quote-container" id="quoteContainer">
                <div class="quote-text" id="quoteText"></div>
                <div class="quote-counter" id="quoteCounter"></div>
            </div>
        </div>

        <!-- شبکه ساعت‌ها (کوچک) -->
        <div class="clocks-grid" id="clocksGrid"></div>

        <!-- فوتر -->
        <footer class="footer">
            ✦ my time ✦ Memento Mori ✦
        </footer>
    </div>

    <!-- فایل quotes.js -->
    <script src="quotes.js"></script>

    <script>
        (function() {
            // ─── تنظیمات ───
            const BACKGROUND_CHANGE_INTERVAL = 90 * 1000;
            const QUOTE_CHANGE_INTERVAL = 20000;
            const CLOCK_UPDATE_INTERVAL = 1000;

            // ─── کشورها ───
            const countries = [
                { city: 'تهران', country: 'ایران', timezone: 'Asia/Tehran', featured: true,
                useShamsi: true },
                { city: 'New York', country: 'USA', timezone: 'America/New_York', featured: false,
                    useShamsi: false },
                { city: 'London', country: 'UK', timezone: 'Europe/London', featured: false,
                useShamsi: false },
                { city: 'Paris', country: 'France', timezone: 'Europe/Paris', featured: false,
                useShamsi: false },
                { city: 'Berlin', country: 'Germany', timezone: 'Europe/Berlin', featured: false,
                    useShamsi: false },
                { city: 'Tokyo', country: 'Japan', timezone: 'Asia/Tokyo', featured: false,
                useShamsi: false },
                { city: 'Beijing', country: 'China', timezone: 'Asia/Shanghai', featured: false,
                    useShamsi: false },
                { city: 'Sydney', country: 'Australia', timezone: 'Australia/Sydney', featured: false,
                    useShamsi: false },
                { city: 'Moscow', country: 'Russia', timezone: 'Europe/Moscow', featured: false,
                    useShamsi: false },
                { city: 'Brasília', country: 'Brazil', timezone: 'America/Sao_Paulo', featured: false,
                    useShamsi: false },
                { city: 'New Delhi', country: 'India', timezone: 'Asia/Kolkata', featured: false,
                    useShamsi: false },
                { city: 'Toronto', country: 'Canada', timezone: 'America/Toronto', featured: false,
                    useShamsi: false },
                { city: 'Seoul', country: 'South Korea', timezone: 'Asia/Seoul', featured: false,
                    useShamsi: false },
                { city: 'Dubai', country: 'UAE', timezone: 'Asia/Dubai', featured: false,
                useShamsi: false },
                { city: 'Johannesburg', country: 'South Africa', timezone: 'Africa/Johannesburg',
                    featured: false, useShamsi: false },
            ];

            // ─── عکس‌های پیش‌فرض ناسا ───
            const DEFAULT_NASA_IMAGES = [
                'https://apod.nasa.gov/apod/image/2312/ConeNebula_Hubble_960.jpg',
                'https://apod.nasa.gov/apod/image/2310/OrionNebula_Jones_960.jpg',
                'https://apod.nasa.gov/apod/image/2309/VeilNebula_Hubble_960.jpg',
                'https://apod.nasa.gov/apod/image/2308/RingNebula_Webb_960.jpg',
                'https://apod.nasa.gov/apod/image/2307/EagleNebula_Hubble_960.jpg',
                'https://apod.nasa.gov/apod/image/2306/M51_Webb_960.jpg',
            ];

            // ─── DOM ───
            const bgLayerA = document.getElementById('bgLayerA');
            const bgLayerB = document.getElementById('bgLayerB');
            const clocksGrid = document.getElementById('clocksGrid');
            const quoteText = document.getElementById('quoteText');
            const quoteCounter = document.getElementById('quoteCounter');
            const particlesCanvas = document.getElementById('particles-canvas');
            const ctx = particlesCanvas.getContext('2d');
            const bgMusic = document.getElementById('bgMusic');
            const musicToggle = document.getElementById('musicToggle');

            // ─── state ───
            let activeLayer = 'A';
            let quoteIndex = 0;
            let clockCards = [];
            let allBgImages = [...DEFAULT_NASA_IMAGES];
            let currentBgIndex = 0;
            let bgRotationTimer, quoteTimer, clockTimer, animationFrameId;
            let particles = [];
            let isMusicPlaying = true;

            // ─── تبدیل تاریخ شمسی ───
            function gregorianToJalali(gDate) {
                const gYear = gDate.getFullYear(),
                    gMonth = gDate.getMonth() + 1,
                    gDay = gDate.getDate();
                const gDaysInMonth = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
                const jDaysInMonth = [31, 31, 31, 31, 31, 31, 30, 29, 29, 29, 29, 29];
                let gy = gYear - 1600,
                    gm = gMonth - 1,
                    gd = gDay - 1;
                let gDayNo = 365 * gy + Math.floor((gy + 3) / 4) - Math.floor((gy + 99) / 100) + Math.floor((gy +
                    399) / 400);
                for (let i = 0; i < gm; i++) gDayNo += gDaysInMonth[i];
                if (gm > 1 && ((gy % 4 === 0 && gy % 100 !== 0) || (gy % 400 === 0))) gDayNo++;
                gDayNo += gd;
                let jDayNo = gDayNo - 79;
                let jNp = Math.floor(jDayNo / 12053);
                jDayNo %= 12053;
                let jy = 979 + 33 * jNp + 4 * Math.floor(jDayNo / 1461);
                jDayNo %= 1461;
                if (jDayNo >= 366) { jy += Math.floor((jDayNo - 1) / 365);
                    jDayNo = (jDayNo - 1) % 365; }
                let jm = 0;
                for (let i = 0; i < 11; i++) {
                    if (jDayNo >= jDaysInMonth[i]) { jDayNo -= jDaysInMonth[i];
                        jm++; } else break;
                }
                const mNames = ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور', 'مهر', 'آبان', 'آذر', 'دی',
                    'بهمن', 'اسفند'
                ];
                return `${jDayNo + 1} ${mNames[jm]} ${jy}`;
            }

            // ─── پس‌زمینه ───
            function setBackground(url, layer) {
                if (url) {
                    layer.style.backgroundImage = `url('${url}')`;
                    layer.style.backgroundSize = 'cover';
                    layer.style.backgroundPosition = 'center';
                    layer.classList.remove('bg-fallback');
                } else layer.classList.add('bg-fallback');
            }

            function rotateBackground() {
                if (!allBgImages.length) return;
                currentBgIndex = (currentBgIndex + 1) % allBgImages.length;
                const img = allBgImages[currentBgIndex];
                if (activeLayer === 'A') {
                    setBackground(img, bgLayerB);
                    bgLayerB.classList.add('fading-in');
                    bgLayerB.classList.remove('fading-out');
                    bgLayerA.classList.add('fading-out');
                    bgLayerA.classList.remove('fading-in');
                    activeLayer = 'B';
                } else {
                    setBackground(img, bgLayerA);
                    bgLayerA.classList.add('fading-in');
                    bgLayerA.classList.remove('fading-out');
                    bgLayerB.classList.add('fading-out');
                    bgLayerB.classList.remove('fading-in');
                    activeLayer = 'A';
                }
            }

            // ─── زمان محلی ───
            function getLocalTimeData(tz, useShamsi) {
                try {
                    const now = new Date();
                    const timeStr = now.toLocaleString('en-US', { timeZone: tz, hour: '2-digit',
                        minute: '2-digit', hour12: false });
                    const dateStr = now.toLocaleString('en-US', { timeZone: tz, weekday: 'short',
                        year: 'numeric', month: 'short', day: 'numeric' });
                    const [h, m] = timeStr.split(':');
                    const hour = parseInt(h);
                    let shamsi = '';
                    if (useShamsi) {
                        try { const d = new Date(now.toLocaleString('en-US', { timeZone: tz }));
                            shamsi = gregorianToJalali(d); } catch (e) {}
                    }
                    return { hours: h, minutes: m, timeStr: `${h}:${m}`, dateStr, shamsiDate: shamsi, isDay: hour >=
                            6 && hour < 18 };
                } catch (e) {
                    const now = new Date();
                    return {
                        hours: String(now.getHours()).padStart(2, '0'),
                        minutes: String(now.getMinutes()).padStart(2, '0'),
                        timeStr: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
                        dateStr: now.toLocaleDateString('en-US', { weekday: 'short', month: 'short',
                            day: 'numeric' }),
                        shamsiDate: useShamsi ? gregorianToJalali(now) : '',
                        isDay: now.getHours() >= 6 && now.getHours() < 18
                    };
                }
            }

            // ─── ساخت کارت‌ها ───
            function createClockCards() {
                clocksGrid.innerHTML = '';
                clockCards = [];
                countries.forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'clock-card';
                    if (c.featured) card.classList.add('iran-featured');
                    card.innerHTML = `
                        <div class="city-name">${c.city}</div>
                        <div class="time-display"><span class="time-main">--:--</span></div>
                        <div class="country-name">${c.country}</div>
                        <div class="date-display">
                            <span class="gregorian-date">---</span>
                            ${c.useShamsi ? '<span class="shamsi-date"></span>' : ''}
                        </div>
                        <div class="daynight-indicator">
                            <span class="daynight-icon">☀️</span>
                            <span class="daynight-label">---</span>
                        </div>`;
                    clocksGrid.appendChild(card);
                    clockCards.push({
                        el: card,
                        tz: c.timezone,
                        shamsi: c.useShamsi,
                        timeMain: card.querySelector('.time-main'),
                        icon: card.querySelector('.daynight-icon'),
                        label: card.querySelector('.daynight-label'),
                        gDate: card.querySelector('.gregorian-date'),
                        sDate: card.querySelector('.shamsi-date'),
                    });
                });
            }

            function updateClocks() {
                clockCards.forEach(c => {
                    const d = getLocalTimeData(c.tz, c.shamsi);
                    c.timeMain.textContent = `${d.hours}:${d.minutes}`;
                    c.el.classList.remove('day-mode', 'night-mode');
                    c.el.classList.add(d.isDay ? 'day-mode' : 'night-mode');
                    c.icon.textContent = d.isDay ? '☀️' : '🌙';
                    c.label.textContent = d.isDay ? 'روز' : 'شب';
                    if (c.gDate) c.gDate.textContent = d.dateStr;
                    if (c.sDate && c.shamsi) c.sDate.textContent = d.shamsiDate || '';
                });
            }

            // ─── نقل‌قول ───
            function updateQuote() {
                if (!window.quotes || !Array.isArray(window.quotes) || !window.quotes.length) {
                    quoteText.textContent = 'فایل quotes.js یافت نشد';
                    quoteCounter.textContent = '';
                    return;
                }
                if (quoteIndex >= window.quotes.length) quoteIndex = 0;
                quoteText.textContent = window.quotes[quoteIndex];
                quoteText.classList.remove('quote-fade');
                void quoteText.offsetWidth;
                quoteText.classList.add('quote-fade');
                quoteCounter.textContent = `${quoteIndex + 1} / ${window.quotes.length}`;
                quoteIndex++;
            }

            // ─── ذرات ───
            function resizeCanvas() {
                particlesCanvas.width = window.innerWidth;
                particlesCanvas.height = window.innerHeight;
            }

            function createParticles() {
                particles = Array.from({ length: Math.min(Math.floor(window.innerWidth * 0.06), 90) }, () => ({
                    x: Math.random() * particlesCanvas.width,
                    y: Math.random() * particlesCanvas.height,
                    r: Math.random() * 1.8 + 0.3,
                    vx: (Math.random() - 0.5) * 0.2,
                    vy: -(Math.random() * 0.3 + 0.1),
                    op: Math.random() * 0.6 + 0.1,
                    ts: Math.random() * 0.01 + 0.004,
                    to: Math.random() * Math.PI * 2,
                }));
            }

            function animateParticles(ts) {
                ctx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.op += Math.sin(ts * p.ts + p.to) * 0.006;
                    p.op = Math.max(0.05, Math.min(0.8, p.op));
                    if (p.y < -5) { p.y = particlesCanvas.height + 5;
                        p.x = Math.random() * particlesCanvas.width; }
                    if (p.x < -5) p.x = particlesCanvas.width + 5;
                    if (p.x > particlesCanvas.width + 5) p.x = -5;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
                    g.addColorStop(0, `rgba(220,210,255,${p.op})`);
                    g.addColorStop(0.5, `rgba(160,150,210,${p.op * 0.5})`);
                    g.addColorStop(1, 'rgba(80,70,140,0)');
                    ctx.fillStyle = g;
                    ctx.fill();
                });
                animationFrameId = requestAnimationFrame(animateParticles);
            }

            // ─── موزیک ───
            function toggleMusic() {
                if (isMusicPlaying) {
                    bgMusic.pause();
                    musicToggle.classList.remove('playing');
                    musicToggle.innerHTML = '♪'; // حالت قطع
                } else {
                    bgMusic.play().catch(() => {});
                    musicToggle.classList.add('playing');
                    musicToggle.innerHTML = '♫';
                }
                isMusicPlaying = !isMusicPlaying;
            }

            musicToggle.addEventListener('click', toggleMusic);

            // تلاش برای پخش خودکار ( نیاز به تعامل کاربر در برخی مرورگرها دارد، اما ما تلاش می‌کنیم)
            function tryAutoplay() {
                bgMusic.play().then(() => {
                    isMusicPlaying = true;
                    musicToggle.classList.add('playing');
                    musicToggle.innerHTML = '♫';
                }).catch(() => {
                    isMusicPlaying = false;
                    musicToggle.classList.remove('playing');
                    musicToggle.innerHTML = '♪';
                });
            }

            // ─── راه‌اندازی ───
            function init() {
                // پس‌زمینه اولیه فوری
                setBackground(DEFAULT_NASA_IMAGES[0], bgLayerA);
                bgLayerA.classList.add('fading-in');

                resizeCanvas();
                createParticles();
                animationFrameId = requestAnimationFrame(animateParticles);

                createClockCards();
                updateClocks();

                // نقل‌قول‌ها
                if (window.quotes && window.quotes.length) {
                    updateQuote();
                } else {
                    quoteText.textContent = 'فایل quotes.js را کنار index.html قرار دهید';
                    quoteCounter.textContent = '';
                }

                // تایمرها
                clockTimer = setInterval(updateClocks, CLOCK_UPDATE_INTERVAL);
                quoteTimer = setInterval(updateQuote, QUOTE_CHANGE_INTERVAL);
                bgRotationTimer = setInterval(rotateBackground, BACKGROUND_CHANGE_INTERVAL);

                // موزیک
                tryAutoplay();
                // برخی مرورگرها نیاز به کلیک اول دارند، ما یک بار دیگر با تاخیر امتحان می‌کنیم
                setTimeout(() => {
                    if (bgMusic.paused) tryAutoplay();
                }, 1000);

                // عکس‌های بیشتر در پس‌زمینه
                fetch('https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY&count=6&thumbs=true')
                    .then(r => r.json())
                    .then(data => {
                        const newImgs = data.filter(i => i.media_type === 'image' && (i.hdurl || i.url))
                            .map(i => i.hdurl || i.url);
                        if (newImgs.length) allBgImages = [...DEFAULT_NASA_IMAGES, ...newImgs];
                    }).catch(() => {});

                window.addEventListener('resize', () => { resizeCanvas();
                    createParticles(); });
            }

            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();

            window.addEventListener('beforeunload', () => {
                clearInterval(clockTimer);
                clearInterval(quoteTimer);
                clearInterval(bgRotationTimer);
                cancelAnimationFrame(animationFrameId);
            });
        })();
    </script>
</body>
</html>
