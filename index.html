<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my time ✧ Memento Mori</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Cinzel:wght@400;500;600;700&family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --glass-blur: blur(10px);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Vazirmatn', 'Cormorant Garamond', sans-serif;
            min-height: 100vh;
            background: #0a0a18; /* fallback */
            color: #e8e4f0;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
            transition: background 1s ease;
        }

        /* بوم پشت‌زمینه (تمام عناصر متحرک) */
        #background-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
        }

        /* overlay ملایم برای عمق */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
        }

        /* دکمه تغییر تم */
        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 110;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #fff;
            box-shadow: 0 4px 18px rgba(0,0,0,0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            user-select: none;
        }
        .theme-switch:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 22px rgba(255,255,255,0.3);
        }

        /* گرامافون */
        .gramophone-toggle {
            position: fixed;
            bottom: 20px; left: 20px;
            z-index: 100;
            width: 40px; height: 40px;
            background: transparent;
            border: none;
            cursor: pointer;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .record-disc {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #1a1a1a, #0a0a0a 70%);
            border: 2px solid #333;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .record-disc.playing { animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .record-label {
            width: 35%; height: 35%;
            background: radial-gradient(circle, #d4af37, #8b6914);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; color: #0a0a0a; font-weight: bold;
        }

        /* کانتینر اصلی */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 20px 30px;
        }

        /* لوگو */
        .header {
            text-align: center;
            padding: 20px 20px 8px;
        }
        .logo-text {
            font-family: 'Playfair Display', 'Cinzel', serif;
            font-size: 3.2rem; font-weight: 700;
            letter-spacing: 2px; /* کاهش فاصله */
            background: linear-gradient(180deg, #f5e6c8, #d4af37 40%, #b8922e 70%, #d4af37);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
            filter: drop-shadow(0 4px 12px rgba(180,130,40,0.6));
            font-style: italic; line-height: 1.1;
            animation: glow 4s ease-in-out infinite;
        }
        @keyframes glow {
            0%,100%{ filter: drop-shadow(0 4px 12px rgba(180,130,40,0.6)); }
            50%{ filter: drop-shadow(0 4px 26px rgba(212,175,55,0.9)); }
        }
        .logo-subtitle {
            font-family: 'Cormorant Garamond', 'Playfair Display', serif;
            font-size: 1.2rem; letter-spacing: 4px;
            color: #c4a86c; text-transform: uppercase;
            margin-top: 0; font-style: italic; font-weight: 500;
        }
        .logo-divider {
            width: 110px; height: 1.5px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 6px auto 0;
        }

        /* نقل‌قول */
        .quote-section {
            margin: 14px auto 12px; padding: 0 8px;
        }
        .quote-container {
            width: 100%;
            background: rgba(20, 15, 35, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(200, 170, 100, 0.25);
            border-radius: 12px;
            padding: 14px 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
        }
        .quote-container::before {
            content: ''; position: absolute; top:0; left:0; right:0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.6), transparent);
        }
        .quote-text {
            font-family: 'Vazirmatn', 'Cormorant Garamond', serif;
            font-size: 1.1rem; font-style: italic;
            color: #ede5d0; letter-spacing: 0.3px;
            line-height: 1.8; text-align: center;
            transition: opacity 0.4s ease;
        }
        .quote-author {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.8rem;
            color: #d4af37;
            text-align: right;
            margin-top: 6px;
            margin-right: 10px;
            font-style: italic;
            opacity: 0.9;
        }
        .quote-fade { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn {
            from { opacity:0; transform: translateY(5px); }
            to { opacity:1; transform: translateY(0); }
        }

        /* شبکه ساعت‌ها */
        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 6px; padding: 0 4px;
        }

        .clock-card {
            position: relative;
            border-radius: 14px;
            padding: 12px 6px 8px;
            text-align: center;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 3px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .clock-card.day-mode {
            background: linear-gradient(145deg, rgba(245,242,235,0.7), rgba(255,252,245,0.75));
            border: 1px solid rgba(200,170,110,0.5);
            color: #2a241a;
        }
        .clock-card.night-mode {
            background: linear-gradient(145deg, rgba(16,14,35,0.65), rgba(28,22,50,0.75));
            border: 1px solid rgba(140,160,220,0.4);
            color: #e0dbef;
        }
        .clock-card:hover {
            transform: translateY(-3px);
            z-index: 5;
        }
        .clock-card.iran-featured {
            border: 1.5px solid rgba(212,175,55,0.7) !important;
            box-shadow: 0 0 18px rgba(212,175,55,0.3) !important;
        }

        .city-name {
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem; font-weight: 600;
            letter-spacing: 0.5px; margin-bottom: 2px;
        }
        .time-display {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem; font-weight: 700;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.05);
            padding: 2px 8px; border-radius: 6px;
        }
        .date-display {
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.6rem; opacity: 0.7;
            direction: ltr; margin-top: 2px;
        }
        .date-display .shamsi-date {
            display: block; font-size: 0.55rem; opacity: 0.7;
        }

        .footer {
            text-align: center; padding: 10px;
            font-size: 0.6rem; color: #8e8a80;
            letter-spacing: 2px; opacity: 0.5;
        }

        /* واکنش‌گرایی */
        @media (max-width: 1200px) { .clocks-grid { grid-template-columns: repeat(4,1fr); } }
        @media (max-width: 900px) { .clocks-grid { grid-template-columns: repeat(3,1fr); } .logo-text { font-size:2.4rem; } }
        @media (max-width: 600px) {
            .clocks-grid { grid-template-columns: repeat(2,1fr); gap:6px; }
            .clock-card { padding:8px 4px; min-height:75px; }
            .time-display { font-size:1.2rem; }
            .city-name { font-size:0.7rem; }
            .logo-text { font-size:1.8rem; }
            .quote-text { font-size:1rem; }
            .gramophone-toggle { width:34px; height:34px; bottom:12px; left:12px; }
            .theme-switch { width:38px; height:38px; top:12px; right:12px; font-size:1.2rem; }
        }

        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:#0a0a18; }
        ::-webkit-scrollbar-thumb { background:#3a3040; border-radius:2px; }
    </style>
</head>
<body>

    <!-- موزیک پس‌زمینه -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://dl.musicviral.ir/Music/04-04/Emilio%20Piano%20x%20Lucie%20-%20Maison.mp3" type="audio/mpeg">
    </audio>

    <!-- دکمه تغییر تم -->
    <button class="theme-switch" id="themeSwitch" title="تغییر تم">✨</button>

    <!-- گرامافون -->
    <button class="gramophone-toggle" id="gramophoneToggle" title="پخش/قطع موسیقی">
        <div class="record-disc" id="recordDisc">
            <div class="record-label">♪</div>
        </div>
    </button>

    <!-- بوم پس‌زمینه -->
    <canvas id="background-canvas"></canvas>
    <div class="bg-overlay"></div>

    <!-- کانتینر اصلی -->
    <div class="main-container">

        <header class="header">
            <h1 class="logo-text">my time</h1>
            <p class="logo-subtitle">Memento Mori</p>
            <div class="logo-divider"></div>
        </header>

        <!-- نقل‌قول -->
        <div class="quote-section">
            <div class="quote-container">
                <div class="quote-text" id="quoteText"></div>
                <div class="quote-author" id="quoteAuthor"></div>
            </div>
        </div>

        <!-- شبکه ساعت‌ها -->
        <div class="clocks-grid" id="clocksGrid"></div>

        <footer class="footer">
            ✦ my time ✦ Memento Mori ✦
        </footer>
    </div>

    <!-- فایل quotes.js -->
    <script src="quotes.js"></script>

    <script>
        (function() {
            // ---------- تنظیمات ----------
            const QUOTE_INTERVAL = 20_000;
            const CLOCK_INTERVAL = 1_000;

            const countries = [
                { city: 'Tehran',   timezone: 'Asia/Tehran',       featured: true,  useShamsi: true },
                { city: 'New York', timezone: 'America/New_York',  featured: false, useShamsi: false },
                { city: 'London',   timezone: 'Europe/London',     featured: false, useShamsi: false },
                { city: 'Paris',    timezone: 'Europe/Paris',      featured: false, useShamsi: false },
                { city: 'Berlin',   timezone: 'Europe/Berlin',     featured: false, useShamsi: false },
                { city: 'Tokyo',    timezone: 'Asia/Tokyo',        featured: false, useShamsi: false },
                { city: 'Beijing',  timezone: 'Asia/Shanghai',     featured: false, useShamsi: false },
                { city: 'Sydney',   timezone: 'Australia/Sydney',  featured: false, useShamsi: false },
                { city: 'Moscow',   timezone: 'Europe/Moscow',     featured: false, useShamsi: false },
                { city: 'Brasília', timezone: 'America/Sao_Paulo', featured: false, useShamsi: false },
                { city: 'New Delhi',timezone: 'Asia/Kolkata',      featured: false, useShamsi: false },
                { city: 'Toronto',  timezone: 'America/Toronto',   featured: false, useShamsi: false },
                { city: 'Seoul',    timezone: 'Asia/Seoul',        featured: false, useShamsi: false },
                { city: 'Dubai',    timezone: 'Asia/Dubai',        featured: false, useShamsi: false },
                { city: 'Johannesburg', timezone: 'Africa/Johannesburg', featured: false, useShamsi: false }
            ];

            // ---------- تم‌های پویا ----------
            const themes = [
                {
                    name: 'کهکشانی',
                    bg: '#0a0a18',
                    starColor: 'rgba(230,220,255,0.9)',
                    cloudColor: 'rgba(70, 40, 120, 0.15)',
                    gradient: ['#1a1030', '#0a0a18', '#020210']
                },
                {
                    name: 'صورتی رؤیایی',
                    bg: '#1f0e1a',
                    starColor: 'rgba(255,200,220,0.9)',
                    cloudColor: 'rgba(180, 70, 120, 0.2)',
                    gradient: ['#2c1324', '#1f0e1a', '#10060c']
                },
                {
                    name: 'آبی اقیانوسی',
                    bg: '#0a1628',
                    starColor: 'rgba(180,220,255,0.9)',
                    cloudColor: 'rgba(40, 100, 180, 0.2)',
                    gradient: ['#10243c', '#0a1628', '#040b14']
                },
                {
                    name: 'سفید مهتابی',
                    bg: '#1c1c2a',
                    starColor: 'rgba(255,255,255,0.9)',
                    cloudColor: 'rgba(180, 180, 200, 0.2)',
                    gradient: ['#2a2a3a', '#1c1c2a', '#101018']
                }
            ];
            let currentThemeIndex = 0;
            let currentTheme = themes[0];

            // DOM
            const bgCanvas = document.getElementById('background-canvas');
            const ctx = bgCanvas.getContext('2d');
            const clocksGrid = document.getElementById('clocksGrid');
            const quoteText = document.getElementById('quoteText');
            const quoteAuthor = document.getElementById('quoteAuthor');
            const bgMusic = document.getElementById('bgMusic');
            const gramophoneBtn = document.getElementById('gramophoneToggle');
            const recordDisc = document.getElementById('recordDisc');
            const themeSwitch = document.getElementById('themeSwitch');

            let quoteIndex = 0;
            let clockCards = [];
            let isPlaying = true;
            let quotesArray = [];

            // ذرات و ابرها
            let particles = [];
            let clouds = [];

            // ---------- تاریخ شمسی ----------
            function gregorianToJalali(date) {
                const gYear = date.getFullYear(), gMonth = date.getMonth()+1, gDay = date.getDate();
                const gDays = [31,28,31,30,31,30,31,31,30,31,30,31];
                const jDays = [31,31,31,31,31,31,30,29,29,29,29,29];
                let gy = gYear-1600, gm = gMonth-1, gd = gDay-1;
                let gDayNo = 365*gy + Math.floor((gy+3)/4) - Math.floor((gy+99)/100) + Math.floor((gy+399)/400);
                for(let i=0;i<gm;i++) gDayNo += gDays[i];
                if(gm>1 && ((gy%4===0 && gy%100!==0) || gy%400===0)) gDayNo++;
                gDayNo += gd;
                let jDayNo = gDayNo - 79;
                let jNp = Math.floor(jDayNo/12053);
                jDayNo %= 12053;
                let jy = 979 + 33*jNp + 4*Math.floor(jDayNo/1461);
                jDayNo %= 1461;
                if(jDayNo >= 366) { jy += Math.floor((jDayNo-1)/365); jDayNo = (jDayNo-1)%365; }
                let jm=0;
                for(let i=0;i<11;i++) {
                    if(jDayNo >= jDays[i]) { jDayNo -= jDays[i]; jm++; }
                    else break;
                }
                const months = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
                return `${jDayNo+1} ${months[jm]} ${jy}`;
            }

            function getLocalTimeData(tz, shamsi) {
                try {
                    const now = new Date();
                    const timeOpts = { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false };
                    const dateOpts = { timeZone: tz, weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
                    const timeStr = now.toLocaleString('en-US', timeOpts);
                    const dateStr = now.toLocaleString('en-US', dateOpts);
                    const [h, m] = timeStr.split(':');
                    const hour = parseInt(h);
                    let shamsiDate = '';
                    if(shamsi) {
                        try { const d = new Date(now.toLocaleString('en-US',{timeZone:tz})); shamsiDate = gregorianToJalali(d); } catch(e){}
                    }
                    return { hours:h, minutes:m, timeStr:`${h}:${m}`, dateStr, shamsiDate, isDay: hour>=6 && hour<18 };
                } catch(e) {
                    const now = new Date();
                    const h = String(now.getHours()).padStart(2,'0');
                    const m = String(now.getMinutes()).padStart(2,'0');
                    return {
                        hours:h, minutes:m, timeStr:`${h}:${m}`,
                        dateStr: now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}),
                        shamsiDate: shamsi ? gregorianToJalali(now) : '',
                        isDay: now.getHours()>=6 && now.getHours()<18
                    };
                }
            }

            // ساخت کارت‌ها
            function createClockCards() {
                clocksGrid.innerHTML = '';
                clockCards = [];
                countries.forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'clock-card';
                    if(c.featured) card.classList.add('iran-featured');
                    card.innerHTML = `
                        <div class="city-name">${c.city}</div>
                        <div class="time-display"><span class="time-main">--:--</span></div>
                        <div class="date-display">
                            <span class="gregorian-date">---</span>
                            ${c.useShamsi ? '<span class="shamsi-date"></span>' : ''}
                        </div>`;
                    clocksGrid.appendChild(card);
                    clockCards.push({
                        el: card,
                        tz: c.timezone,
                        shamsi: c.useShamsi,
                        timeMain: card.querySelector('.time-main'),
                        gDate: card.querySelector('.gregorian-date'),
                        sDate: card.querySelector('.shamsi-date')
                    });
                });
            }

            function updateClocks() {
                clockCards.forEach(card => {
                    const d = getLocalTimeData(card.tz, card.shamsi);
                    card.timeMain.textContent = d.timeStr;
                    card.el.classList.remove('day-mode','night-mode');
                    card.el.classList.add(d.isDay ? 'day-mode' : 'night-mode');
                    if(card.gDate) card.gDate.textContent = d.dateStr;
                    if(card.sDate && card.shamsi) card.sDate.textContent = d.shamsiDate || '';
                });
            }

            // نقل‌قول‌ها
            function prepareQuotes() {
                if (window.quotes && Array.isArray(window.quotes) && window.quotes.length > 0) {
                    quotesArray = window.quotes;
                } else if (typeof quotes !== 'undefined' && Array.isArray(quotes) && quotes.length > 0) {
                    quotesArray = quotes;
                } else {
                    quotesArray = [];
                }
            }

            function updateQuote() {
                if (quotesArray.length === 0) prepareQuotes();
                if (quotesArray.length === 0) {
                    quoteText.textContent = 'فایل quotes.js یافت نشد';
                    quoteAuthor.textContent = '';
                    return;
                }
                if (quoteIndex >= quotesArray.length) quoteIndex = 0;
                const quote = quotesArray[quoteIndex];
                if (typeof quote === 'string') {
                    quoteText.textContent = quote;
                    quoteAuthor.textContent = '';
                } else if (quote && quote.text) {
                    quoteText.textContent = quote.text;
                    quoteAuthor.textContent = quote.author ? `— ${quote.author}` : '';
                } else {
                    quoteText.textContent = JSON.stringify(quote);
                    quoteAuthor.textContent = '';
                }
                quoteText.classList.remove('quote-fade');
                void quoteText.offsetWidth;
                quoteText.classList.add('quote-fade');
                quoteIndex++;
            }

            // ---------- پس‌زمینهٔ متحرک ----------
            function resizeCanvas() {
                bgCanvas.width = window.innerWidth;
                bgCanvas.height = window.innerHeight;
            }

            function createParticlesAndClouds() {
                particles = [];
                clouds = [];
                const starCount = Math.min(120, Math.floor(window.innerWidth * 0.1));
                for (let i = 0; i < starCount; i++) {
                    particles.push({
                        x: Math.random() * bgCanvas.width,
                        y: Math.random() * bgCanvas.height,
                        radius: Math.random() * 2 + 0.5,
                        speedX: (Math.random() - 0.5) * 0.15,
                        speedY: -(Math.random() * 0.2 + 0.05),
                        opacity: Math.random() * 0.7 + 0.3,
                        twinkleSpeed: Math.random() * 0.02 + 0.005,
                        twinkleOffset: Math.random() * Math.PI * 2
                    });
                }
                // ابرهای شناور
                const cloudCount = 6;
                for (let i = 0; i < cloudCount; i++) {
                    clouds.push({
                        x: Math.random() * bgCanvas.width,
                        y: Math.random() * bgCanvas.height,
                        width: Math.random() * 200 + 100,
                        height: Math.random() * 60 + 30,
                        speedX: (Math.random() - 0.5) * 0.4,
                        speedY: Math.random() * 0.1 + 0.05,
                        opacity: Math.random() * 0.25 + 0.05
                    });
                }
            }

            function drawBackground(timestamp) {
                ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
                
                // گرادیان پس‌زمینه
                const grad = ctx.createLinearGradient(0, 0, 0, bgCanvas.height);
                grad.addColorStop(0, currentTheme.gradient[0]);
                grad.addColorStop(0.5, currentTheme.gradient[1]);
                grad.addColorStop(1, currentTheme.gradient[2]);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

                // ابرها
                clouds.forEach(cloud => {
                    ctx.save();
                    ctx.globalAlpha = cloud.opacity;
                    ctx.fillStyle = currentTheme.cloudColor;
                    ctx.beginPath();
                    ctx.ellipse(cloud.x, cloud.y, cloud.width/2, cloud.height/2, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(cloud.x - cloud.width*0.3, cloud.y - cloud.height*0.2, cloud.width*0.3, cloud.height*0.4, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(cloud.x + cloud.width*0.3, cloud.y - cloud.height*0.1, cloud.width*0.3, cloud.height*0.4, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();

                    cloud.x += cloud.speedX;
                    cloud.y += cloud.speedY;
                    if (cloud.x > bgCanvas.width + 100) cloud.x = -100;
                    if (cloud.x < -100) cloud.x = bgCanvas.width + 100;
                    if (cloud.y > bgCanvas.height + 100) cloud.y = -100;
                    if (cloud.y < -100) cloud.y = bgCanvas.height + 100;
                });

                // ستاره‌ها
                particles.forEach(p => {
                    p.opacity += Math.sin(timestamp * p.twinkleSpeed + p.twinkleOffset) * 0.008;
                    p.opacity = Math.max(0.2, Math.min(0.9, p.opacity));
                    p.x += p.speedX;
                    p.y += p.speedY;
                    if (p.x < -5) p.x = bgCanvas.width + 5;
                    if (p.x > bgCanvas.width + 5) p.x = -5;
                    if (p.y < -5) p.y = bgCanvas.height + 5;
                    if (p.y > bgCanvas.height + 5) p.y = -5;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                    ctx.fillStyle = currentTheme.starColor.replace('0.9', p.opacity);
                    ctx.fill();
                });

                requestAnimationFrame(drawBackground);
            }

            function applyTheme(index) {
                currentThemeIndex = index;
                currentTheme = themes[index];
                document.body.style.backgroundColor = currentTheme.bg;
                // ذرات و ابرها را بازسازی نمی‌کنیم، فقط رنگ‌ها عوض می‌شوند
            }

            // تغییر تم با دکمه
            themeSwitch.addEventListener('click', () => {
                let next = (currentThemeIndex + 1) % themes.length;
                applyTheme(next);
            });

            // موزیک
            function toggleMusic() {
                if(isPlaying) { bgMusic.pause(); recordDisc.classList.remove('playing'); isPlaying = false; }
                else { bgMusic.play().catch(()=>{}); recordDisc.classList.add('playing'); isPlaying = true; }
            }
            gramophoneBtn.addEventListener('click', toggleMusic);

            function tryAutoplay() {
                bgMusic.play().then(() => { isPlaying = true; recordDisc.classList.add('playing'); })
                .catch(() => { isPlaying = false; recordDisc.classList.remove('playing'); });
            }

            // راه‌اندازی
            function init() {
                resizeCanvas();
                createParticlesAndClouds();
                requestAnimationFrame(drawBackground);

                createClockCards();
                updateClocks();

                prepareQuotes();
                updateQuote();

                setInterval(updateClocks, CLOCK_INTERVAL);
                setInterval(updateQuote, QUOTE_INTERVAL);

                tryAutoplay();
                setTimeout(() => { if(bgMusic.paused) tryAutoplay(); }, 1000);

                window.addEventListener('resize', () => {
                    resizeCanvas();
                    createParticlesAndClouds();
                });
            }

            if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();
        })();
    </script>
</body>
</html>
