<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my time ✧ Memento Mori</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Cinzel:wght@400;500;600;700&family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --glass-blur: blur(10px);
            --card-day-bg: linear-gradient(145deg, rgba(245,242,235,0.7), rgba(255,252,245,0.75));
            --card-night-bg: linear-gradient(145deg, rgba(16,14,35,0.65), rgba(28,22,50,0.75));
            --quote-bg: rgba(20, 15, 35, 0.4);
            --star-color: rgba(230,220,255,0.9);
            --body-font: 'Vazirmatn', 'Cormorant Garamond', sans-serif;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: var(--body-font);
            min-height: 100vh;
            background: #0a0a18;
            color: #e8e4f0;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
            transition: font-family 0.3s;
        }

        /* لایه‌های عکس */
        .bg-image-layer {
            position: fixed; top:0; left:0; width:100%; height:100%;
            z-index: -4;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            transition: none;
            transform: translate3d(0,0,0);
            will-change: background-image;
        }
        .bg-image-layer.layer-a { z-index: -4; }
        .bg-image-layer.layer-b { z-index: -5; }

        #background-canvas {
            position: fixed; top:0; left:0; width:100%; height:100%;
            z-index: -2; pointer-events: none;
            transform: translate3d(0,0,0);
        }

        .bg-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            z-index: -1; pointer-events: none;
            transition: background 0.6s ease;
            transform: translate3d(0,0,0);
        }

        /* دکمه همبرگری (گوشه بالا راست) */
        .hamburger-btn {
            position: fixed;
            top: 16px; right: 16px;
            z-index: 150;
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            padding: 7px;
            transition: background 0.3s;
        }
        .hamburger-btn:hover { background: rgba(212,175,55,0.2); }
        .hamburger-btn span {
            display: block;
            width: 22px; height: 2px;
            background: #d4af37;
            border-radius: 2px;
            transition: all 0.3s;
        }
        .hamburger-btn.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger-btn.open span:nth-child(2) { opacity: 0; }
        .hamburger-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        /* کشوی منو */
        .menu-drawer {
            position: fixed;
            top: 0; right: -100%;
            width: 320px; height: 100vh;
            background: rgba(10, 8, 22, 0.93);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-left: 1px solid rgba(212, 175, 55, 0.3);
            z-index: 145;
            padding: 70px 18px 20px;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 35px rgba(0,0,0,0.7);
            overflow-y: auto;
        }
        .menu-drawer.open { right: 0; }

        .menu-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 140;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .menu-overlay.active { opacity: 1; pointer-events: auto; }

        .menu-drawer h3 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        /* دسته‌بندی‌های آکاردئونی */
        .menu-category {
            margin-bottom: 8px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255,255,255,0.03);
        }
        .menu-cat-header {
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 600;
            color: #d4af37;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            transition: background 0.2s;
        }
        .menu-cat-header:hover { background: rgba(212,175,55,0.1); }
        .menu-cat-header .arrow {
            margin-right: auto;
            transition: transform 0.3s;
            font-size: 0.7rem;
        }
        .menu-category.open .arrow { transform: rotate(180deg); }

        .menu-cat-items {
            max-height: 0;
            overflow-y: auto;
            transition: max-height 0.3s ease;
            padding: 0 8px;
            background: rgba(0,0,0,0.1);
        }
        .menu-category.open .menu-cat-items {
            max-height: 300px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            margin: 3px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #ddd;
            transition: background 0.2s;
        }
        .menu-item:hover { background: rgba(212,175,55,0.2); color: #fff; }

        /* دکمه تم (پایین راست) */
        .theme-switch {
            position: fixed; bottom: 20px; right: 20px;
            z-index: 100;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; color: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s, box-shadow 0.3s;
            user-select: none;
        }
        .theme-switch:hover { transform: scale(1.12); }

        /* گرامافون */
        .gramophone-toggle {
            position: fixed; bottom: 20px; left: 20px;
            z-index: 100;
            width: 40px; height: 40px;
            background: transparent; border: none;
            cursor: pointer;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
            display: flex; align-items: center; justify-content: center;
        }
        .record-disc {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #1a1a1a, #0a0a0a 70%);
            border: 2px solid #333;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.4);
            display: flex; align-items: center; justify-content: center;
        }
        .record-disc.playing { animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .record-label {
            width: 35%; height: 35%;
            background: radial-gradient(circle, #d4af37, #8b6914);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; color: #0a0a0a; font-weight: bold;
        }

        /* کانتینر اصلی */
        .main-container {
            position: relative; z-index: 1;
            max-width: 1300px; margin: 0 auto;
            padding: 20px 20px 30px;
        }

        .header { text-align: center; padding: 20px 20px 8px; }
        .logo-text {
            font-family: 'Playfair Display', 'Cinzel', serif;
            font-size: 3.2rem; font-weight: 700; letter-spacing: 2px;
            background: linear-gradient(180deg, #f5e6c8, #d4af37 40%, #b8922e 70%, #d4af37);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
            filter: drop-shadow(0 4px 12px rgba(180,130,40,0.6));
            font-style: italic; line-height: 1.1;
            animation: glow 4s ease-in-out infinite;
        }
        @keyframes glow {
            0%,100%{ filter: drop-shadow(0 4px 12px rgba(180,130,40,0.6)); }
            50%{ filter: drop-shadow(0 4px 26px rgba(212,175,55,0.9)); }
        }
        .logo-subtitle {
            font-family: 'Cormorant Garamond', 'Playfair Display', serif;
            font-size: 1.2rem; letter-spacing: 4px; color: #c4a86c;
            text-transform: uppercase; margin-top: 0; font-style: italic; font-weight: 500;
        }
        .logo-divider {
            width: 110px; height: 1.5px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 6px auto 0;
        }

        .quote-section { margin: 14px auto 12px; padding: 0 8px; }
        .quote-container {
            width: 100%; background: var(--quote-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(200,170,100,0.25); border-radius: 12px;
            padding: 14px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            position: relative; overflow: hidden; transition: background 0.5s;
        }
        .quote-container::before {
            content: ''; position: absolute; top:0; left:0; right:0;
            height: 1px; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.6), transparent);
        }
        .quote-text {
            font-size: 1.15rem; font-style: italic; color: #ede5d0;
            letter-spacing: 0.3px; line-height: 1.8; text-align: center;
            transition: opacity 0.4s;
        }
        .quote-author {
            font-family: 'Cormorant Garamond', serif; font-size: 0.8rem;
            color: #d4af37; text-align: right; margin-top: 6px;
            font-style: italic; opacity: 0.9; padding-right: 10px;
        }
        .quote-fade { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from{opacity:0; transform:translateY(5px);} to{opacity:1; transform:translateY(0);} }

        .clocks-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 10px; margin-top: 6px; padding: 0 4px;
        }
        .clock-card {
            border-radius: 14px; padding: 12px 6px 8px; text-align: center;
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            min-height: 90px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 3px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
            transition: transform 0.3s, box-shadow 0.3s, background 0.5s;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .clock-card.day-mode {
            background: var(--card-day-bg); border: 1px solid rgba(200,170,110,0.5); color: #2a241a;
        }
        .clock-card.night-mode {
            background: var(--card-night-bg); border: 1px solid rgba(140,160,220,0.4); color: #e0dbef;
        }
        .clock-card:hover { transform: translateY(-3px); z-index: 5; }
        .clock-card.iran-featured {
            border: 1.5px solid rgba(212,175,55,0.7) !important;
            box-shadow: 0 0 18px rgba(212,175,55,0.3) !important;
        }
        .city-name { font-family: 'Playfair Display', serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 2px; }
        .time-display { font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: 700; letter-spacing: 1px; background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 6px; }
        .date-display { font-size: 0.6rem; opacity: 0.7; direction: ltr; margin-top: 2px; }
        .date-display .shamsi-date { display: block; font-size: 0.55rem; opacity: 0.7; }

        .footer { text-align: center; padding: 10px; font-size: 0.6rem; color: #8e8a80; letter-spacing: 2px; opacity: 0.5; }

        @media (max-width: 1200px) { .clocks-grid { grid-template-columns: repeat(4,1fr); } }
        @media (max-width: 900px) { .clocks-grid { grid-template-columns: repeat(3,1fr); } .logo-text { font-size:2.4rem; } }
        @media (max-width: 600px) {
            .clocks-grid { grid-template-columns: repeat(2,1fr); gap:6px; }
            .clock-card { padding:8px 4px; min-height:75px; }
            .time-display { font-size:1.2rem; }
            .city-name { font-size:0.7rem; }
            .logo-text { font-size:1.8rem; }
            .quote-text { font-size:1rem; }
            .gramophone-toggle, .theme-switch { width:34px; height:34px; bottom:12px; }
            .gramophone-toggle { left:12px; }
            .theme-switch { right:12px; font-size:1rem; }
        }
    </style>
</head>
<body>

    <!-- موزیک پس‌زمینه -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://dl.musicviral.ir/Music/04-04/Emilio%20Piano%20x%20Lucie%20-%20Maison.mp3" type="audio/mpeg">
    </audio>

    <!-- لایه‌های عکس -->
    <div class="bg-image-layer layer-a" id="bgLayerA"></div>
    <div class="bg-image-layer layer-b" id="bgLayerB"></div>

    <!-- دکمه همبرگری -->
    <button class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></button>
    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="menu-drawer" id="menuDrawer">
        <h3>my time ✦</h3>
        <div id="menuContent"></div>
    </div>

    <!-- دکمه تم -->
    <button class="theme-switch" id="themeSwitch">🌙</button>

    <!-- گرامافون -->
    <button class="gramophone-toggle" id="gramophoneToggle">
        <div class="record-disc" id="recordDisc"><div class="record-label">♪</div></div>
    </button>

    <!-- بوم ستاره‌ها -->
    <canvas id="background-canvas"></canvas>
    <div class="bg-overlay" id="bgOverlay"></div>

    <!-- کانتینر اصلی -->
    <div class="main-container">
        <header class="header">
            <h1 class="logo-text">my time</h1>
            <p class="logo-subtitle">Memento Mori</p>
            <div class="logo-divider"></div>
        </header>
        <div class="quote-section">
            <div class="quote-container" id="quoteContainer">
                <div class="quote-text" id="quoteText"></div>
                <div class="quote-author" id="quoteAuthor"></div>
            </div>
        </div>
        <div class="clocks-grid" id="clocksGrid"></div>
        <footer class="footer">✦ my time ✦ Memento Mori ✦</footer>
    </div>

    <!-- فایل quotes.js -->
    <script src="quotes.js"></script>

    <!-- اسکریپت اصلی (فقط صفحه اصلی، بدون منو) -->
    <script>
        (function() {
            const QUOTE_INTERVAL = 10000;
            const CLOCK_INTERVAL = 1000;
            const IMAGE_INTERVAL = 30000;

            const backgroundImages = [
                'https://img2.taw-bio.ir/2023/159777/1jk1lmtb.jpeg',
                'https://img2.taw-bio.ir/2023/121972/1j9e58kd.jpeg',
                'https://img2.taw-bio.ir/2025/145183/1l664r7r.jpeg',
                'https://img1.taw-bio.ir/2024/229243/1klr78th.jpeg',
                'https://img2.taw-bio.ir/2025/392630/1lc0oac4.jpeg',
                'https://img2.taw-bio.ir/2025/205616/1l7t639j.jpeg',
                'https://img1.taw-bio.ir/2024/168786/1kit38dk.jpeg',
                'https://img2.taw-bio.ir/2024/287555/1l1elhf5.jpeg',
                'https://img2.taw-bio.ir/2023/126393/1ja65qjg.jpeg',
                'https://img2.taw-bio.ir/2025/334556/1l6enr81.jpeg',
                'https://img2.taw-bio.ir/2024/252561/1l1d8ni9.jpeg',
                'https://img2.taw-bio.ir/2026/740228/1lmt9jrd.jpeg',
                'https://img2.taw-bio.ir/2025/293463/1l529lpq.jpeg',
                'https://img1.taw-bio.ir/2024/149021/1kjfgp6r.jpeg',
                'https://img1.taw-bio.ir/2024/246443/1knvm3k2.jpeg',
                'https://img1.taw-bio.ir/2024/177700/1khrn9jt.jpeg'
            ];

            const countries = [
                { city: 'Tehran', timezone: 'Asia/Tehran', featured: true, useShamsi: true },
                { city: 'New York', timezone: 'America/New_York' },
                { city: 'London', timezone: 'Europe/London' },
                { city: 'Paris', timezone: 'Europe/Paris' },
                { city: 'Berlin', timezone: 'Europe/Berlin' },
                { city: 'Tokyo', timezone: 'Asia/Tokyo' },
                { city: 'Beijing', timezone: 'Asia/Shanghai' },
                { city: 'Sydney', timezone: 'Australia/Sydney' },
                { city: 'Moscow', timezone: 'Europe/Moscow' },
                { city: 'Brasília', timezone: 'America/Sao_Paulo' },
                { city: 'New Delhi', timezone: 'Asia/Kolkata' },
                { city: 'Toronto', timezone: 'America/Toronto' },
                { city: 'Seoul', timezone: 'Asia/Seoul' },
                { city: 'Dubai', timezone: 'Asia/Dubai' },
                { city: 'Johannesburg', timezone: 'Africa/Johannesburg' }
            ];

            // ۶ تم با رنگ‌های کاملاً متفاوت
            const themes = [
                {
                    name: 'کهکشانی',
                    overlayColor: 'rgba(10,0,20,0.3)',
                    quoteBg: 'rgba(20,15,35,0.4)',
                    starColor: 'rgba(230,220,255,0.9)',
                    bodyFont: "'Vazirmatn', 'Cormorant Garamond', sans-serif",
                    cardDayBg: 'linear-gradient(145deg, rgba(245,242,235,0.7), rgba(255,252,245,0.75))',
                    cardNightBg: 'linear-gradient(145deg, rgba(16,14,35,0.65), rgba(28,22,50,0.75))'
                },
                {
                    name: 'قرمز مخملی',
                    overlayColor: 'rgba(30,0,5,0.3)',
                    quoteBg: 'rgba(35,10,15,0.4)',
                    starColor: 'rgba(255,180,180,0.9)',
                    bodyFont: "'Vazirmatn', 'Cormorant Garamond', sans-serif",
                    cardDayBg: 'linear-gradient(145deg, rgba(252,235,235,0.7), rgba(255,240,240,0.75))',
                    cardNightBg: 'linear-gradient(145deg, rgba(40,10,15,0.65), rgba(50,15,20,0.75))'
                },
                {
                    name: 'آبی اقیانوسی',
                    overlayColor: 'rgba(0,10,30,0.3)',
                    quoteBg: 'rgba(10,15,35,0.4)',
                    starColor: 'rgba(150,200,255,0.9)',
                    bodyFont: "'Vazirmatn', 'Cormorant Garamond', sans-serif",
                    cardDayBg: 'linear-gradient(145deg, rgba(235,242,255,0.7), rgba(245,248,255,0.75))',
                    cardNightBg: 'linear-gradient(145deg, rgba(10,20,40,0.65), rgba(15,25,50,0.75))'
                },
                {
                    name: 'سبز زمردی',
                    overlayColor: 'rgba(0,25,10,0.3)',
                    quoteBg: 'rgba(10,30,15,0.4)',
                    starColor: 'rgba(150,255,180,0.9)',
                    bodyFont: "'Vazirmatn', 'Cormorant Garamond', sans-serif",
                    cardDayBg: 'linear-gradient(145deg, rgba(235,252,240,0.7), rgba(245,255,248,0.75))',
                    cardNightBg: 'linear-gradient(145deg, rgba(10,30,15,0.65), rgba(15,40,20,0.75))'
                },
                {
                    name: 'طلایی مجلل',
                    overlayColor: 'rgba(20,15,0,0.3)',
                    quoteBg: 'rgba(35,25,10,0.4)',
                    starColor: 'rgba(255,220,150,0.9)',
                    bodyFont: "'Playfair Display', serif",
                    cardDayBg: 'linear-gradient(145deg, rgba(252,245,230,0.7), rgba(255,250,240,0.75))',
                    cardNightBg: 'linear-gradient(145deg, rgba(40,30,15,0.65), rgba(50,40,20,0.75))'
                },
                {
                    name: 'شیشه‌ای (Glass)',
                    overlayColor: 'rgba(200,200,220,0.15)',
                    quoteBg: 'rgba(255,255,255,0.08)',
                    starColor: 'rgba(255,255,255,0.9)',
                    bodyFont: "'Cormorant Garamond', serif",
                    cardDayBg: 'linear-gradient(145deg, rgba(255,255,255,0.25), rgba(255,255,255,0.35))',
                    cardNightBg: 'linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.2))'
                }
            ];

            const bgLayerA = document.getElementById('bgLayerA'), bgLayerB = document.getElementById('bgLayerB');
            const bgOverlay = document.getElementById('bgOverlay');
            const canvas = document.getElementById('background-canvas'), ctx = canvas.getContext('2d');
            const clocksGrid = document.getElementById('clocksGrid');
            const quoteText = document.getElementById('quoteText'), quoteAuthor = document.getElementById('quoteAuthor');
            const quoteContainer = document.getElementById('quoteContainer');
            const bgMusic = document.getElementById('bgMusic');
            const gramophoneBtn = document.getElementById('gramophoneToggle'), recordDisc = document.getElementById('recordDisc');
            const themeSwitch = document.getElementById('themeSwitch');

            let quoteIndex = 0, clockCards = [], isPlaying = true, quotesArray = [];
            let currentThemeIndex = 0, currentTheme = themes[0];
            let activeLayer = 'A', nextImageIndex = -1, stars = [];

            function getRandomImageIndex() {
                let n; do { n = Math.floor(Math.random() * backgroundImages.length); } while (n === nextImageIndex && backgroundImages.length > 1);
                return n;
            }
            function setInitialImage() { const i = getRandomImageIndex(); nextImageIndex = i; bgLayerA.style.backgroundImage = `url('${backgroundImages[i]}')`; activeLayer = 'A'; }
            function changeBackgroundImage() {
                const i = getRandomImageIndex(); nextImageIndex = i;
                const target = activeLayer === 'A' ? bgLayerB : bgLayerA;
                target.style.backgroundImage = `url('${backgroundImages[i]}')`;
                if (activeLayer === 'A') { bgLayerB.style.zIndex = -4; bgLayerA.style.zIndex = -5; activeLayer = 'B'; }
                else { bgLayerA.style.zIndex = -4; bgLayerB.style.zIndex = -5; activeLayer = 'A'; }
            }

            function gregorianToJalali(d) {
                const g = [31,28,31,30,31,30,31,31,30,31,30,31], j = [31,31,31,31,31,31,30,29,29,29,29,29];
                let gy = d.getFullYear()-1600, gm = d.getMonth(), gd = d.getDate()-1;
                let gdn = 365*gy + Math.floor((gy+3)/4) - Math.floor((gy+99)/100) + Math.floor((gy+399)/400);
                for(let i=0;i<gm;i++) gdn += g[i];
                if(gm>1 && ((gy%4===0 && gy%100!==0) || gy%400===0)) gdn++;
                gdn += gd;
                let jdn = gdn - 79, jnp = Math.floor(jdn/12053); jdn %= 12053;
                let jy = 979 + 33*jnp + 4*Math.floor(jdn/1461); jdn %= 1461;
                if(jdn >= 366) { jy += Math.floor((jdn-1)/365); jdn = (jdn-1)%365; }
                let jm = 0;
                for(let i=0;i<11;i++) { if(jdn >= j[i]) { jdn -= j[i]; jm++; } else break; }
                const m = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
                return `${jdn+1} ${m[jm]} ${jy}`;
            }
            function getLocalTime(tz, shamsi) {
                try {
                    const now = new Date();
                    const t = now.toLocaleString('en-US', { timeZone: tz, hour:'2-digit', minute:'2-digit', hour12:false });
                    const d = now.toLocaleString('en-US', { timeZone: tz, weekday:'short', year:'numeric', month:'short', day:'numeric' });
                    const [h,m] = t.split(':'); const hour = parseInt(h);
                    let s = ''; if(shamsi) { try { s = gregorianToJalali(new Date(now.toLocaleString('en-US',{timeZone:tz}))); } catch(e){} }
                    return { hours:h, minutes:m, timeStr:`${h}:${m}`, dateStr:d, shamsiDate:s, isDay: hour>=6 && hour<18 };
                } catch(e) {
                    const now = new Date();
                    return { hours: String(now.getHours()).padStart(2,'0'), minutes: String(now.getMinutes()).padStart(2,'0'), timeStr:`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`, dateStr: now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}), shamsiDate: shamsi? gregorianToJalali(now) : '', isDay: now.getHours()>=6 && now.getHours()<18 };
                }
            }
            function createClocks() {
                clocksGrid.innerHTML = '';
                clockCards = [];
                countries.forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'clock-card';
                    if(c.featured) card.classList.add('iran-featured');
                    card.innerHTML = `<div class="city-name">${c.city}</div><div class="time-display"><span class="time-main">--:--</span></div><div class="date-display"><span class="gregorian-date">---</span>${c.useShamsi ? '<span class="shamsi-date"></span>' : ''}</div>`;
                    clocksGrid.appendChild(card);
                    clockCards.push({ el: card, tz: c.timezone, shamsi: c.useShamsi, timeMain: card.querySelector('.time-main'), gDate: card.querySelector('.gregorian-date'), sDate: card.querySelector('.shamsi-date') });
                });
            }
            function updateClocks() {
                clockCards.forEach(c => {
                    const d = getLocalTime(c.tz, c.shamsi);
                    c.timeMain.textContent = d.timeStr;
                    c.el.classList.remove('day-mode','night-mode'); c.el.classList.add(d.isDay ? 'day-mode' : 'night-mode');
                    if(c.gDate) c.gDate.textContent = d.dateStr;
                    if(c.sDate && c.shamsi) c.sDate.textContent = d.shamsiDate || '';
                });
            }

            function prepareQuotes() {
                if(window.quotes && Array.isArray(window.quotes)) quotesArray = window.quotes;
                else if(typeof quotes !== 'undefined' && Array.isArray(quotes)) quotesArray = quotes;
                else quotesArray = [];
            }
            function updateQuote() {
                if(!quotesArray.length) prepareQuotes();
                if(!quotesArray.length) { quoteText.textContent = 'فایل quotes.js یافت نشد'; quoteAuthor.textContent = ''; return; }
                if(quoteIndex >= quotesArray.length) quoteIndex = 0;
                const q = quotesArray[quoteIndex];
                quoteText.textContent = typeof q === 'string' ? q : (q?.text || JSON.stringify(q));
                quoteAuthor.textContent = (q?.author) ? `— ${q.author}` : '';
                quoteText.classList.remove('quote-fade'); void quoteText.offsetWidth; quoteText.classList.add('quote-fade');
                quoteIndex++;
            }

            function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            function createStars() {
                stars = [];
                for(let i=0;i<50;i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*3+3, speedY: -(Math.random()*0.3+0.1), speedX: (Math.random()-0.5)*0.2, opacity: Math.random()*0.5+0.4, twinkleSpeed: Math.random()*0.02+0.005, twinkleOffset: Math.random()*Math.PI*2 });
            }
            function drawStar(cx,cy,outer,inner,op) {
                ctx.beginPath(); let rot = Math.PI/2*3, step = Math.PI/5;
                ctx.moveTo(cx, cy-outer);
                for(let i=0;i<5;i++) { ctx.lineTo(cx+Math.cos(rot)*outer, cy+Math.sin(rot)*outer); rot+=step; ctx.lineTo(cx+Math.cos(rot)*inner, cy+Math.sin(rot)*inner); rot+=step; }
                ctx.closePath(); ctx.fillStyle = currentTheme.starColor.replace('0.9', op); ctx.fill();
            }
            function drawBackground(ts) {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                stars.forEach(s => {
                    let op = s.opacity + Math.sin(ts*s.twinkleSpeed + s.twinkleOffset)*0.1;
                    op = Math.max(0.3, Math.min(0.9, op));
                    drawStar(s.x, s.y, s.size, s.size/2.5, op);
                    s.y += s.speedY; s.x += s.speedX;
                    if(s.y < -10) { s.y = canvas.height+10; s.x = Math.random()*canvas.width; }
                    if(s.x < -10) s.x = canvas.width+10; if(s.x > canvas.width+10) s.x = -10;
                });
                requestAnimationFrame(drawBackground);
            }

            // تابع تغییر تم (global تا tools.js هم استفاده کند)
            window.applyTheme = function(idx) {
                currentThemeIndex = idx;
                currentTheme = themes[idx];
                bgOverlay.style.background = `radial-gradient(ellipse at center, ${currentTheme.overlayColor} 0%, rgba(0,0,0,0.4) 100%)`;
                quoteContainer.style.background = currentTheme.quoteBg;
                document.body.style.fontFamily = currentTheme.bodyFont;
                document.documentElement.style.setProperty('--card-day-bg', currentTheme.cardDayBg);
                document.documentElement.style.setProperty('--card-night-bg', currentTheme.cardNightBg);
            };

            function toggleMusic() {
                if(isPlaying) { bgMusic.pause(); recordDisc.classList.remove('playing'); isPlaying = false; }
                else { bgMusic.play().catch(()=>{}); recordDisc.classList.add('playing'); isPlaying = true; }
            }
            gramophoneBtn.addEventListener('click', toggleMusic);
            function tryAutoplay() { bgMusic.play().then(() => { isPlaying = true; recordDisc.classList.add('playing'); }).catch(() => { isPlaying = false; recordDisc.classList.remove('playing'); }); }

            function init() {
                setInitialImage();
                setInterval(changeBackgroundImage, IMAGE_INTERVAL);
                resizeCanvas(); createStars();
                requestAnimationFrame(drawBackground);
                createClocks(); updateClocks();
                prepareQuotes(); updateQuote();
                applyTheme(0);
                setInterval(updateClocks, CLOCK_INTERVAL);
                setInterval(updateQuote, QUOTE_INTERVAL);
                tryAutoplay();
                setTimeout(() => { if(bgMusic.paused) tryAutoplay(); }, 1000);
                window.addEventListener('resize', () => { resizeCanvas(); createStars(); });

                themeSwitch.addEventListener('click', () => {
                    applyTheme((currentThemeIndex + 1) % themes.length);
                });
            }

            if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();
        })();
    </script>

    <!-- فایل tools.js (همه چیز را مدیریت می‌کند) -->
    <script src="tools.js"></script>
