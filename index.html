<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my time ✧ Memento Mori</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Cinzel:wght@400;500;600;700&family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --glass-blur: blur(10px);
            --card-day-bg: linear-gradient(145deg, rgba(245,242,235,0.7), rgba(255,252,245,0.75));
            --card-night-bg: linear-gradient(145deg, rgba(16,14,35,0.65), rgba(28,22,50,0.75));
            --quote-bg: rgba(20, 15, 35, 0.4);
            --star-color: rgba(230,220,255,0.9);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Vazirmatn', 'Cormorant Garamond', sans-serif;
            min-height: 100vh;
            background: #0a0a18;
            color: #e8e4f0;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* لایه‌های عکس پس‌زمینه */
        .bg-image-layer {
            position: fixed; top:0; left:0; width:100%; height:100%;
            z-index: -4;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            transition: none;
            transform: translate3d(0,0,0);
            will-change: background-image;
        }
        .bg-image-layer.layer-a { z-index: -4; }
        .bg-image-layer.layer-b { z-index: -5; }

        #background-canvas {
            position: fixed; top:0; left:0; width:100%; height:100%;
            z-index: -2; pointer-events: none;
            transform: translate3d(0,0,0);
        }

        .bg-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            z-index: -1; pointer-events: none;
            transition: background 0.6s ease;
            transform: translate3d(0,0,0);
        }

        /* دکمهٔ منو (بسیار کوچک، خط طلایی) */
        .menu-mini-btn {
            position: fixed;
            top: 16px; right: 16px;
            z-index: 150;
            width: 28px; height: 28px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            padding: 4px;
            transition: transform 0.3s;
        }
        .menu-mini-btn span {
            display: block;
            width: 100%;
            height: 2px;
            background: #d4af37;
            border-radius: 2px;
            transition: all 0.3s;
        }
        .menu-mini-btn.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .menu-mini-btn.open span:nth-child(2) { opacity: 0; }
        .menu-mini-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        /* کشوی منو */
        .menu-drawer {
            position: fixed;
            top: 0; right: -100%;
            width: 300px; height: 100vh;
            background: rgba(18, 15, 32, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-left: 1px solid rgba(212, 175, 55, 0.3);
            z-index: 145;
            padding: 60px 16px 20px;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 30px rgba(0,0,0,0.6);
            overflow-y: auto;
            direction: rtl;
        }
        .menu-drawer.open { right: 0; }

        .menu-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 140;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .menu-overlay.active { opacity: 1; pointer-events: auto; }

        .menu-drawer h3 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        .menu-drawer .category { margin-bottom: 8px; }
        .menu-drawer .cat-title {
            font-weight: 600;
            color: #d4af37;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }
        .menu-drawer .item {
            padding: 6px 10px;
            margin: 2px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #ddd;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .menu-drawer .item:hover {
            background: rgba(212,175,55,0.2);
            color: #fff;
        }

        /* دکمه تم (پایین راست) */
        .theme-switch {
            position: fixed; bottom: 20px; right: 20px;
            z-index: 100;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; color: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s, box-shadow 0.3s;
            user-select: none;
            transform: translate3d(0,0,0);
        }
        .theme-switch:hover { transform: scale(1.12); box-shadow: 0 6px 26px rgba(255,255,255,0.35); }
        .theme-switch.rotating { animation: rotateDab 0.6s ease; }
        @keyframes rotateDab { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }

        .theme-tooltip {
            position: fixed; bottom: 68px; right: 10px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff; padding: 4px 12px;
            border-radius: 14px; font-size: 0.7rem;
            z-index: 110; opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }
        .theme-tooltip.show { opacity:1; transform:translateY(0); }

        /* گرامافون */
        .gramophone-toggle {
            position: fixed; bottom: 20px; left: 20px;
            z-index: 100;
            width: 40px; height: 40px;
            background: transparent; border: none;
            cursor: pointer;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
            display: flex; align-items: center; justify-content: center;
            transform: translate3d(0,0,0);
        }
        .record-disc {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #1a1a1a, #0a0a0a 70%);
            border: 2px solid #333;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.4);
            display: flex; align-items: center; justify-content: center;
        }
        .record-disc.playing { animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .record-label {
            width: 35%; height: 35%;
            background: radial-gradient(circle, #d4af37, #8b6914);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; color: #0a0a0a; font-weight: bold;
        }

        /* کانتینر اصلی */
        .main-container {
            position: relative; z-index: 1;
            max-width: 1300px; margin: 0 auto;
            padding: 20px 20px 30px;
        }

        .header { text-align: center; padding: 20px 20px 8px; }
        .logo-text {
            font-family: 'Playfair Display', 'Cinzel', serif;
            font-size: 3.2rem; font-weight: 700; letter-spacing: 2px;
            background: linear-gradient(180deg, #f5e6c8, #d4af37 40%, #b8922e 70%, #d4af37);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
            filter: drop-shadow(0 4px 12px rgba(180,130,40,0.6));
            font-style: italic; line-height: 1.1;
            animation: glow 4s ease-in-out infinite;
        }
        @keyframes glow {
            0%,100%{ filter: drop-shadow(0 4px 12px rgba(180,130,40,0.6)); }
            50%{ filter: drop-shadow(0 4px 26px rgba(212,175,55,0.9)); }
        }
        .logo-subtitle {
            font-family: 'Cormorant Garamond', 'Playfair Display', serif;
            font-size: 1.2rem; letter-spacing: 4px; color: #c4a86c;
            text-transform: uppercase; margin-top: 0; font-style: italic; font-weight: 500;
        }
        .logo-divider {
            width: 110px; height: 1.5px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 6px auto 0;
        }

        .quote-section { margin: 14px auto 12px; padding: 0 8px; }
        .quote-container {
            width: 100%; background: var(--quote-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(200,170,100,0.25); border-radius: 12px;
            padding: 14px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            position: relative; overflow: hidden; transition: background 0.5s;
        }
        .quote-container::before {
            content: ''; position: absolute; top:0; left:0; right:0;
            height: 1px; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.6), transparent);
        }
        .quote-text {
            font-size: 1.15rem; font-style: italic; color: #ede5d0;
            letter-spacing: 0.3px; line-height: 1.8; text-align: center;
            transition: opacity 0.4s;
        }
        .quote-author {
            font-family: 'Cormorant Garamond', serif; font-size: 0.8rem;
            color: #d4af37; text-align: right; margin-top: 6px;
            font-style: italic; opacity: 0.9; padding-right: 10px;
        }
        .quote-fade { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from{opacity:0; transform:translateY(5px);} to{opacity:1; transform:translateY(0);} }

        .clocks-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 10px; margin-top: 6px; padding: 0 4px;
        }
        .clock-card {
            border-radius: 14px; padding: 12px 6px 8px; text-align: center;
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            min-height: 90px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 3px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
            transition: transform 0.3s, box-shadow 0.3s, background 0.5s;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .clock-card.day-mode {
            background: var(--card-day-bg); border: 1px solid rgba(200,170,110,0.5); color: #2a241a;
        }
        .clock-card.night-mode {
            background: var(--card-night-bg); border: 1px solid rgba(140,160,220,0.4); color: #e0dbef;
        }
        .clock-card:hover { transform: translateY(-3px); z-index: 5; }
        .clock-card.iran-featured {
            border: 1.5px solid rgba(212,175,55,0.7) !important;
            box-shadow: 0 0 18px rgba(212,175,55,0.3) !important;
        }
        .city-name { font-family: 'Playfair Display', serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 2px; }
        .time-display { font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: 700; letter-spacing: 1px; background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 6px; }
        .date-display { font-size: 0.6rem; opacity: 0.7; direction: ltr; margin-top: 2px; }
        .date-display .shamsi-date { display: block; font-size: 0.55rem; opacity: 0.7; }

        .footer { text-align: center; padding: 10px; font-size: 0.6rem; color: #8e8a80; letter-spacing: 2px; opacity: 0.5; }

        /* مدال‌های عمومی */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: rgba(22, 18, 38, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(212,175,55,0.35);
            border-radius: 20px;
            padding: 28px 24px;
            width: 90%; max-width: 620px; max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            color: #e8e4f0;
            direction: rtl;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-close {
            position: absolute; top: 12px; left: 12px;
            width: 34px; height: 34px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            color: #fff; font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .modal-close:hover { background: rgba(255,100,100,0.3); }

        .tool-btn {
            background: rgba(212,175,55,0.2);
            border: 1px solid rgba(212,175,55,0.4);
            color: #fff;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Vazirmatn', sans-serif;
            margin: 4px;
            transition: 0.3s;
        }
        .tool-btn:hover { background: rgba(212,175,55,0.4); }
        .tool-input {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(212,175,55,0.3);
            color: #fff;
            padding: 8px 12px;
            border-radius: 10px;
            font-family: 'Vazirmatn', sans-serif;
            width: 100%;
            margin: 6px 0;
            outline: none;
        }

        @media (max-width: 1200px) { .clocks-grid { grid-template-columns: repeat(4,1fr); } }
        @media (max-width: 900px) { .clocks-grid { grid-template-columns: repeat(3,1fr); } .logo-text { font-size:2.4rem; } }
        @media (max-width: 600px) {
            .clocks-grid { grid-template-columns: repeat(2,1fr); gap:6px; }
            .clock-card { padding:8px 4px; min-height:75px; }
            .time-display { font-size:1.2rem; }
            .city-name { font-size:0.7rem; }
            .logo-text { font-size:1.8rem; }
            .quote-text { font-size:1rem; }
            .gramophone-toggle, .theme-switch { width:34px; height:34px; bottom:12px; }
            .gramophone-toggle { left:12px; }
            .theme-switch { right:12px; font-size:1rem; }
        }
    </style>
</head>
<body>

    <!-- موزیک پس‌زمینه -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://dl.musicviral.ir/Music/04-04/Emilio%20Piano%20x%20Lucie%20-%20Maison.mp3" type="audio/mpeg">
    </audio>

    <!-- لایه‌های عکس -->
    <div class="bg-image-layer layer-a" id="bgLayerA"></div>
    <div class="bg-image-layer layer-b" id="bgLayerB"></div>

    <!-- دکمهٔ کوچک منو -->
    <button class="menu-mini-btn" id="menuMiniBtn"><span></span><span></span><span></span></button>

    <!-- کشوی منو -->
    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="menu-drawer" id="menuDrawer"><h3>my time ✦</h3><div id="menuContent"></div></div>

    <!-- دکمه تم -->
    <button class="theme-switch" id="themeSwitch">🌙</button>
    <div class="theme-tooltip" id="themeTooltip"></div>

    <!-- گرامافون -->
    <button class="gramophone-toggle" id="gramophoneToggle">
        <div class="record-disc" id="recordDisc"><div class="record-label">♪</div></div>
    </button>

    <!-- بوم ستاره‌ها -->
    <canvas id="background-canvas"></canvas>
    <div class="bg-overlay" id="bgOverlay"></div>

    <!-- کانتینر اصلی -->
    <div class="main-container">
        <header class="header">
            <h1 class="logo-text">my time</h1>
            <p class="logo-subtitle">Memento Mori</p>
            <div class="logo-divider"></div>
        </header>
        <div class="quote-section">
            <div class="quote-container" id="quoteContainer">
                <div class="quote-text" id="quoteText"></div>
                <div class="quote-author" id="quoteAuthor"></div>
            </div>
        </div>
        <div class="clocks-grid" id="clocksGrid"></div>
        <footer class="footer">✦ my time ✦ Memento Mori ✦</footer>
    </div>

    <!-- مدال عمومی -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" id="modalClose">✕</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- فایل quotes.js -->
    <script src="quotes.js"></script>

    <script>
        (function() {
            // ========== تنظیمات ==========
            const QUOTE_INTERVAL = 10000;
            const CLOCK_INTERVAL = 1000;
            const IMAGE_INTERVAL = 30000;

            const backgroundImages = [
                'https://img2.taw-bio.ir/2023/159777/1jk1lmtb.jpeg',
                'https://img2.taw-bio.ir/2023/121972/1j9e58kd.jpeg',
                'https://img2.taw-bio.ir/2025/145183/1l664r7r.jpeg',
                'https://img1.taw-bio.ir/2024/229243/1klr78th.jpeg',
                'https://img2.taw-bio.ir/2025/392630/1lc0oac4.jpeg',
                'https://img2.taw-bio.ir/2025/205616/1l7t639j.jpeg',
                'https://img1.taw-bio.ir/2024/168786/1kit38dk.jpeg',
                'https://img2.taw-bio.ir/2024/287555/1l1elhf5.jpeg',
                'https://img2.taw-bio.ir/2023/126393/1ja65qjg.jpeg',
                'https://img2.taw-bio.ir/2025/334556/1l6enr81.jpeg',
                'https://img2.taw-bio.ir/2024/252561/1l1d8ni9.jpeg',
                'https://img2.taw-bio.ir/2026/740228/1lmt9jrd.jpeg',
                'https://img2.taw-bio.ir/2025/293463/1l529lpq.jpeg',
                'https://img1.taw-bio.ir/2024/149021/1kjfgp6r.jpeg',
                'https://img1.taw-bio.ir/2024/246443/1knvm3k2.jpeg',
                'https://img1.taw-bio.ir/2024/177700/1khrn9jt.jpeg'
            ];

            const countries = [
                { city: 'Tehran', timezone: 'Asia/Tehran', featured: true, useShamsi: true },
                { city: 'New York', timezone: 'America/New_York' },
                { city: 'London', timezone: 'Europe/London' },
                { city: 'Paris', timezone: 'Europe/Paris' },
                { city: 'Berlin', timezone: 'Europe/Berlin' },
                { city: 'Tokyo', timezone: 'Asia/Tokyo' },
                { city: 'Beijing', timezone: 'Asia/Shanghai' },
                { city: 'Sydney', timezone: 'Australia/Sydney' },
                { city: 'Moscow', timezone: 'Europe/Moscow' },
                { city: 'Brasília', timezone: 'America/Sao_Paulo' },
                { city: 'New Delhi', timezone: 'Asia/Kolkata' },
                { city: 'Toronto', timezone: 'America/Toronto' },
                { city: 'Seoul', timezone: 'Asia/Seoul' },
                { city: 'Dubai', timezone: 'Asia/Dubai' },
                { city: 'Johannesburg', timezone: 'Africa/Johannesburg' }
            ];

            const themes = [
                { name: 'کهکشانی', overlayColor: 'rgba(10,0,20,0.3)', quoteBg: 'rgba(20,15,35,0.4)', starColor: 'rgba(230,220,255,0.9)' },
                { name: 'صورتی رؤیایی', overlayColor: 'rgba(30,5,20,0.3)', quoteBg: 'rgba(35,15,30,0.4)', starColor: 'rgba(255,200,220,0.9)' },
                { name: 'آبی دریایی', overlayColor: 'rgba(0,10,25,0.3)', quoteBg: 'rgba(15,20,35,0.4)', starColor: 'rgba(180,220,255,0.9)' },
                { name: 'سفید مهتابی', overlayColor: 'rgba(20,20,30,0.3)', quoteBg: 'rgba(30,30,40,0.4)', starColor: 'rgba(255,255,255,0.9)' }
            ];

            // DOM
            const bgLayerA = document.getElementById('bgLayerA'), bgLayerB = document.getElementById('bgLayerB');
            const bgOverlay = document.getElementById('bgOverlay');
            const canvas = document.getElementById('background-canvas'), ctx = canvas.getContext('2d');
            const clocksGrid = document.getElementById('clocksGrid');
            const quoteText = document.getElementById('quoteText'), quoteAuthor = document.getElementById('quoteAuthor');
            const quoteContainer = document.getElementById('quoteContainer');
            const bgMusic = document.getElementById('bgMusic');
            const gramophoneBtn = document.getElementById('gramophoneToggle'), recordDisc = document.getElementById('recordDisc');
            const themeSwitch = document.getElementById('themeSwitch'), themeTooltip = document.getElementById('themeTooltip');
            const menuBtn = document.getElementById('menuMiniBtn'), menuDrawer = document.getElementById('menuDrawer');
            const menuOverlay = document.getElementById('menuOverlay');
            const modalOverlay = document.getElementById('modalOverlay'), modalBody = document.getElementById('modalBody');
            const modalClose = document.getElementById('modalClose');

            let quoteIndex = 0, clockCards = [], isPlaying = true, quotesArray = [];
            let currentThemeIndex = 0, currentTheme = themes[0];
            let activeLayer = 'A', nextImageIndex = -1, stars = [];

            // ========== پس‌زمینه ==========
            function getRandomImageIndex() {
                let n; do { n = Math.floor(Math.random() * backgroundImages.length); } while (n === nextImageIndex && backgroundImages.length > 1);
                return n;
            }
            function setInitialImage() { const i = getRandomImageIndex(); nextImageIndex = i; bgLayerA.style.backgroundImage = `url('${backgroundImages[i]}')`; activeLayer = 'A'; }
            async function changeBackgroundImage() {
                const i = getRandomImageIndex(); nextImageIndex = i;
                const url = backgroundImages[i];
                const target = activeLayer === 'A' ? bgLayerB : bgLayerA;
                target.style.backgroundImage = `url('${url}')`;
                if (activeLayer === 'A') { bgLayerB.style.zIndex = -4; bgLayerA.style.zIndex = -5; activeLayer = 'B'; }

            // ========== ساعت‌ها ==========
            function gregorianToJalali(d) {
                const g = [31,28,31,30,31,30,31,31,30,31,30,31], j = [31,31,31,31,31,31,30,29,29,29,29,29];
                let gy = d.getFullYear()-1600, gm = d.getMonth(), gd = d.getDate()-1;
                let gdn = 365*gy + Math.floor((gy+3)/4) - Math.floor((gy+99)/100) + Math.floor((gy+399)/400);
                for(let i=0;i<gm;i++) gdn += g[i];
                if(gm>1 && ((gy%4===0 && gy%100!==0) || gy%400===0)) gdn++;
                gdn += gd;
                let jdn = gdn - 79, jnp = Math.floor(jdn/12053); jdn %= 12053;
                let jy = 979 + 33*jnp + 4*Math.floor(jdn/1461); jdn %= 1461;
                if(jdn >= 366) { jy += Math.floor((jdn-1)/365); jdn = (jdn-1)%365; }
                let jm = 0;
                for(let i=0;i<11;i++) { if(jdn >= j[i]) { jdn -= j[i]; jm++; } else break; }
                const m = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
                return `${jdn+1} ${m[jm]} ${jy}`;
            }
            function getLocalTime(tz, shamsi) {
                try {
                    const now = new Date();
                    const t = now.toLocaleString('en-US', { timeZone: tz, hour:'2-digit', minute:'2-digit', hour12:false });
                    const d = now.toLocaleString('en-US', { timeZone: tz, weekday:'short', year:'numeric', month:'short', day:'numeric' });
                    const [h,m] = t.split(':'); const hour = parseInt(h);
                    let s = ''; if(shamsi) { try { s = gregorianToJalali(new Date(now.toLocaleString('en-US',{timeZone:tz}))); } catch(e){} }
                    return { hours:h, minutes:m, timeStr:`${h}:${m}`, dateStr:d, shamsiDate:s, isDay: hour>=6 && hour<18 };
                } catch(e) {
                    const now = new Date();
                    return { hours: String(now.getHours()).padStart(2,'0'), minutes: String(now.getMinutes()).padStart(2,'0'), timeStr:`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`, dateStr: now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}), shamsiDate: shamsi? gregorianToJalali(now) : '', isDay: now.getHours()>=6 && now.getHours()<18 };
                }
            }

            function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            function createStars() {
                stars = [];
                for(let i=0;i<50;i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*3+3, speedY: -(Math.random()*0.3+0.1), speedX: (Math.random()-0.5)*0.2, opacity: Math.random()*0.5+0.4, twinkleSpeed: Math.random()*0.02+0.005, twinkleOffset: Math.random()*Math.PI*2 });
            }
            function drawStar(cx,cy,outer,inner,op) {
                ctx.beginPath(); let rot = Math.PI/2*3, step = Math.PI/5;
                ctx.moveTo(cx, cy-outer);
                for(let i=0;i<5;i++) { ctx.lineTo(cx+Math.cos(rot)*outer, cy+Math.sin(rot)*outer); rot+=step; ctx.lineTo(cx+Math.cos(rot)*inner, cy+Math.sin(rot)*inner); rot+=step; }
                ctx.closePath(); ctx.fillStyle = currentTheme.starColor.replace('0.9', op); ctx.fill();
            }
            function drawBackground(ts) {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                stars.forEach(s => {
                    let op = s.opacity + Math.sin(ts*s.twinkleSpeed + s.twinkleOffset)*0.1;
                    op = Math.max(0.3, Math.min(0.9, op));
                    drawStar(s.x, s.y, s.size, s.size/2.5, op);
                    s.y += s.speedY; s.x += s.speedX;
                    if(s.y < -10) { s.y = canvas.height+10; s.x = Math.random()*canvas.width; }
                    if(s.x < -10) s.x = canvas.width+10; if(s.x > canvas.width+10) s.x = -10;
                });
                requestAnimationFrame(drawBackground);
            }

                const showResults = (q = '') => {
                    const filtered = allCities.filter(c => c.toLowerCase().includes(q.toLowerCase()));

            function buildCalendar() {
                const now = new Date();
                const shamsi = gregorianToJalali(now);
                return `<div style="text-align:center; font-size:1.8rem; color:#d4af37; font-family:'Cinzel';">${now.toLocaleDateString('fa-IR',{weekday:'long', year:'numeric', month:'long', day:'numeric'})}</div><div style="text-align:center; margin-top:10px; color:#ccc;">📅 ${shamsi}</div>`;
            }

            function buildMoonPhase() {
                return '<canvas id="moonCanvas" width="200" height="200" style="display:block; margin:0 auto;"></canvas><p style="text-align:center; color:#d4af37; margin-top:10px;" id="moonPhaseText">🌙 فاز ماه</p>';
            }
            function initMoonPhase() {
                const mc = document.getElementById('moonCanvas');
                if(!mc) return;
                const mctx = mc.getContext('2d');
                mctx.fillStyle = '#0a0a18'; mctx.fillRect(0,0,200,200);
                mctx.beginPath(); mctx.arc(100,100,80,0,Math.PI*2); mctx.fillStyle = '#e8e4f0'; mctx.fill();
                const phase = (new Date().getDate() % 30) / 30;
                mctx.beginPath(); mctx.arc(100 + phase*60 - 30,100,75,0,Math.PI*2); mctx.fillStyle = '#0a0a18'; mctx.fill();
                document.getElementById('moonPhaseText').textContent = `🌙 فاز ماه: ${Math.round(phase*100)}%`;
            }

            const menuItems = [
                { cat: '⏱️ ابزارهای اصلی', items: [
                    { icon:'⏱️', text:'کرنوگراف', action: ()=>{ openModal('⏱️ کرنوگراف', buildChronograph()); setTimeout(initChronograph, 100); } },

                    { icon:'⏳', text:'تایمر شمارش معکوس', action: ()=>{ openModal('⏳ تایمر', buildTimer()); setTimeout(initTimer, 100); } },
                    { icon:'🌍', text:'ساعت جهانی', action: ()=>{ openModal('🌍 ساعت جهانی', buildWorldClock()); setTimeout(initWorldClock, 100); } },
                    { icon:'📅', text:'تقویم', action: ()=> openModal('📅 تقویم', buildCalendar()) },
                    { icon:'🌙', text:'فاز ماه', action: ()=>{ openModal('🌙 فاز ماه', buildMoonPhase()); setTimeout(initMoonPhase, 100); } },
                    { icon:'🎨', text:'گالری تم', action: ()=> openModal('🎨 گالری تم', themes.map((t,i)=>`<p style="cursor:pointer; padding:8px; border-radius:8px; margin:4px 0; background:rgba(255,255,255,0.05);" onclick="document.getElementById('modalOverlay').classList.remove('active');applyTheme(${i})">${t.name}</p>`).join('')) },
                ]},
                { cat: '🌐 مناطق زمانی', items: countries.map(c=>({ icon:'🕐', text:`${c.city}`, action: ()=> openModal(c.city, `<p>${getLocalTime(c.timezone).timeStr} - ${getLocalTime(c.timezone).dateStr}</p>`) })) },
                { cat: '⏲️ ابزارهای زمان', items: [
                    { icon:'🔄', text:'تبدیل واحد زمان', action: ()=> openModal('تبدیل', '<input class="tool-input" id="timeConvert" placeholder="دقیقه"><p id="timeResult"></p>') },
                    { icon:'📊', text:'نمودار اختلاف ساعت', action: ()=> openModal('نمودار', '<p>به‌زودی...</p>') },
                    { icon:'⏲️', text:'پومودورو', action: ()=> openModal('پومودورو', buildTimer()) },
                ]},
                { cat: '⚙️ تنظیمات', items: [
                    { icon:'🔤', text:'تغییر فونت', action: ()=> openModal('فونت', '<p>انتخاب فونت</p>') },
                    { icon:'🎚️', text:'شفافیت کارت‌ها', action: ()=> openModal('شفافیت', '<input type="range" min="0.1" max="1" step="0.1" class="tool-input">') },
                ]},
            ];

            function buildMenu() {
                let html = '';
                menuItems.forEach(cat => {
                    html += `<div class="category"><div class="cat-title">${cat.cat}</div>`;
                    cat.items.forEach(item => {
                        html += `<div class="item" data-action="${item.text}"><span>${item.icon}</span> ${item.text}</div>`;
                    });
                    html += '</div>';
                });
                document.getElementById('menuContent').innerHTML = html;
                document.querySelectorAll('.item').forEach(el => {
                    el.addEventListener('click', () => {
                        const action = el.dataset.action;
                        const found = menuItems.flatMap(c=>c.items).find(i=>i.text===action);
                        if(found?.action) found.action();
                        closeMenu();
                    });
                });
            }

            function openMenu() { menuDrawer.classList.add('open'); menuOverlay.classList.add('active'); menuBtn.classList.add('open'); }
            function closeMenu() { menuDrawer.classList.remove('open'); menuOverlay.classList.remove('active'); menuBtn.classList.remove('open'); }
            menuBtn.addEventListener('click', () => menuDrawer.classList.contains('open') ? closeMenu() : openMenu());
            menuOverlay.addEventListener('click', closeMenu);

            // ========== راه‌اندازی ==========
            function init() {
                setInitialImage();
                setInterval(changeBackgroundImage, IMAGE_INTERVAL);
                resizeCanvas(); createStars();
                requestAnimationFrame(drawBackground);
                createClocks(); updateClocks();
                prepareQuotes(); updateQuote();
                applyTheme(0);
                setInterval(updateClocks, CLOCK_INTERVAL);
                setInterval(updateQuote, QUOTE_INTERVAL);
                tryAutoplay();
                setTimeout(() => { if(bgMusic.paused) tryAutoplay(); }, 1000);
                window.addEventListener('resize', () => { resizeCanvas(); createStars(); });
                buildMenu();
            }

            if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();
        })();
    </script>
