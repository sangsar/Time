<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOOD TIME | ساعت لوکس جهانی</title>
  <meta name="description" content="ساعت لوکس جهانی با طراحی رولکس – زمان شهرهای جهان، تاریخ شمسی و نقل‌قول‌های ادبی">
  <meta property="og:title" content="GOOD TIME | ساعت لوکس جهانی">
  <meta property="og:description" content="زمان را به سبک لاکچری تجربه کنید">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "GOOD TIME",
    "applicationCategory": "Lifestyle",
    "description": "ساعت لوکس جهانی با نمایش زمان شهرهای مختلف و تاریخ شمسی"
  }
  </script>
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --glass: rgba(20, 20, 30, 0.65);
      --border: rgba(255, 215, 0, 0.25);
      --text: #f0e6d0;
      --accent: #d4af37;
      --accent-glow: rgba(212, 175, 55, 0.6);
    }
    [data-theme="ice"] { --accent: #7ec8e3; --border: rgba(126,200,227,0.4); --accent-glow: rgba(126,200,227,0.6); }
    [data-theme="purple"] { --accent: #b388ff; --border: rgba(179,136,255,0.4); --accent-glow: rgba(179,136,255,0.6); }
    [data-theme="emerald"] { --accent: #6ee7b7; --border: rgba(110,231,183,0.4); --accent-glow: rgba(110,231,183,0.6); }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Vazirmatn', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* پس‌زمینهٔ ستاره‌ای (بدون تصویر) */
    .stars {
      position: fixed; top:0; left:0; width:100%; height:100%;
      z-index:-1;
      background: radial-gradient(ellipse at 50% 50%, rgba(212,175,55,0.08) 0%, transparent 70%);
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    /* لوگو */
    .logo {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--accent), #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 1.5rem 0 0.5rem;
      filter: drop-shadow(0 0 12px var(--accent-glow));
    }

    /* ساعت دیجیتال ایران */
    .digital-clock {
      text-align: center;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 1.5rem 2rem;
      margin: 0 1rem;
      width: auto;
      display: inline-block;
    }
    .time-main {
      font-size: 3.5rem;
      font-weight: 200;
      letter-spacing: 4px;
      color: white;
      text-shadow: 0 0 20px var(--accent-glow);
    }
    .date-main { font-size: 1rem; opacity: 0.8; margin-top: 0.3rem; }

    /* ساعت آنالوگ بزرگ (Canvas) */
    .analog-container {
      display: flex;
      justify-content: center;
      margin: 2rem 0;
    }
    canvas#mainAnalog {
      width: 220px;
      height: 220px;
      filter: drop-shadow(0 0 15px var(--accent-glow));
    }

    /* شبکه شهرها */
    .cities-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      width: 90%;
      max-width: 700px;
      margin: 1rem auto;
    }
    .city-card {
      background: var(--glass);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1rem;
      text-align: center;
      transition: 0.3s;
      cursor: pointer;
    }
    .city-card:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
    .city-name { font-size: 0.9rem; opacity: 0.8; margin-bottom: 0.3rem; }
    .city-time { font-size: 1.2rem; font-weight: 500; }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-left: 4px;
    }
    .dot-green { background: #10b981; box-shadow: 0 0 8px #10b981; }
    .dot-orange { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }

    /* نقل‌قول */
    .quote-box {
      background: var(--glass);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border);
      border-right: 3px solid var(--accent);
      border-radius: 20px;
      padding: 1rem 1.2rem;
      margin: 1.5rem 1rem 2rem;
      width: 90%;
      max-width: 700px;
    }
    .quote-text { font-style: italic; font-size: 0.9rem; line-height: 1.7; margin-bottom: 0.4rem; }
    .quote-author { font-size: 0.75rem; opacity: 0.6; text-align: left; }
    .next-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 1rem;
      border-radius: 16px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 0.5rem;
    }

    /* مدال شهر */
    .modal {
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
    }
    .modal.active { opacity:1; pointer-events:auto; }
    .modal-content {
      background: var(--glass);
      backdrop-filter: blur(30px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 2rem;
      text-align: center;
      max-width: 320px;
      width: 90%;
    }
    .modal-city { font-size: 1.8rem; margin-bottom: 1rem; }
    .modal-time { font-size: 2.2rem; }
    .modal-date { opacity: 0.8; margin: 0.5rem 0; }
    .close-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1.5rem;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <!-- ستاره‌های پس‌زمینه -->
  <div class="stars" id="starsContainer"></div>

  <div class="logo">GOOD TIME</div>

  <div class="digital-clock">
    <div class="time-main" id="digitalTime">--:--</div>
    <div class="date-main" id="digitalDate">...</div>
  </div>

  <div class="analog-container">
    <canvas id="mainAnalog" width="220" height="220"></canvas>
  </div>

  <div class="cities-grid" id="citiesGrid"></div>

  <div class="quote-box">
    <div class="quote-text" id="quoteText">...</div>
    <div class="quote-author" id="quoteAuthor"></div>
    <button class="next-btn" id="nextQuoteBtn">جمله بعدی</button>
  </div>

  <!-- مدال جزئیات شهر -->
  <div class="modal" id="cityModal">
    <div class="modal-content">
      <div class="modal-city" id="modalCityName"></div>
      <canvas id="modalAnalog" width="150" height="150"></canvas>
      <div class="modal-time" id="modalTime"></div>
      <div class="modal-date" id="modalDate"></div>
      <button class="close-btn" id="closeModal">بستن</button>
    </div>
  </div>

  <script src="quotes.js"></script>
  <script>
    // ==================== ستاره‌های پس‌زمینه ====================
    function createStars() {
      const container = document.getElementById('starsContainer');
      for (let i = 0; i < 120; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = star.style.height = Math.random() * 3 + 1 + 'px';
        star.style.animationDelay = Math.random() * 3 + 's';
        container.appendChild(star);
      }
    }
    createStars();

    // ==================== ساعت آنالوگ اصلی (ایران) ====================
    const mainCanvas = document.getElementById('mainAnalog');
    const mainCtx = mainCanvas.getContext('2d');
    function drawMainAnalog() {
      const now = new Date();
      const h = now.getHours() % 12;
      const m = now.getMinutes();
      const s = now.getSeconds();
      const w = mainCanvas.width;
      const cx = w/2, cy = w/2, r = w/2 - 10;
      mainCtx.clearRect(0,0,w,w);
      // قاب
      mainCtx.beginPath();
      mainCtx.arc(cx, cy, r, 0, Math.PI*2);
      mainCtx.strokeStyle = 'rgba(212,175,55,0.6)';
      mainCtx.lineWidth = 4;
      mainCtx.stroke();
      // عقربه‌ها
      drawHand(mainCtx, cx, cy, (h*30 + m*0.5) * Math.PI/180, r*0.5, 4, '#f8fafc');
      drawHand(mainCtx, cx, cy, m*6 * Math.PI/180, r*0.7, 2.5, '#e2e8f0');
      drawHand(mainCtx, cx, cy, s*6 * Math.PI/180, r*0.8, 1, '#d4af37', true);
      // مرکز
      mainCtx.beginPath();
      mainCtx.arc(cx, cy, 6, 0, 2*Math.PI);
      mainCtx.fillStyle = '#fff';
      mainCtx.fill();
    }
    function drawHand(ctx, x, y, angle, length, width, color, glow=false) {
      ctx.beginPath();
      ctx.lineWidth = width;
      ctx.strokeStyle = color;
      if (glow) ctx.shadowColor = color;
      else ctx.shadowColor = 'transparent';
      ctx.shadowBlur = glow ? 10 : 0;
      ctx.moveTo(x, y);
      ctx.lineTo(x + Math.sin(angle) * length, y - Math.cos(angle) * length);
      ctx.stroke();
      ctx.shadowColor = 'transparent';
    }
    drawMainAnalog();
    setInterval(drawMainAnalog, 1000);

    // ==================== شهرهای جهان ====================
    const worldCities = [
      { name:'تهران', tz:'Asia/Tehran' },
      { name:'لندن', tz:'Europe/London' },
      { name:'نیویورک', tz:'America/New_York' },
      { name:'توکیو', tz:'Asia/Tokyo' },
      { name:'دبی', tz:'Asia/Dubai' },
      { name:'پاریس', tz:'Europe/Paris' },
      { name:'برلین', tz:'Europe/Berlin' },
      { name:'مسکو', tz:'Europe/Moscow' },
      { name:'سیدنی', tz:'Australia/Sydney' },
      { name:'تورنتو', tz:'America/Toronto' },
      { name:'بمبئی', tz:'Asia/Kolkata' },
      { name:'شانگهای', tz:'Asia/Shanghai' }
    ];

    function updateWorldCities() {
      const now = new Date();
      document.getElementById('citiesGrid').innerHTML = worldCities.map(c => {
        const cityTime = new Date(now.toLocaleString('en-US', { timeZone: c.tz }));
        const hour = cityTime.getHours();
        const isBusiness = hour >= 9 && hour < 17;
        const dotClass = isBusiness ? 'dot-green' : 'dot-orange';
        return `
          <div class="city-card" data-city="${c.name}" data-tz="${c.tz}">
            <div class="city-name">${c.name}</div>
            <div class="city-time"><span class="status-dot ${dotClass}"></span>${cityTime.toLocaleTimeString('fa-IR', { hour:'2-digit', minute:'2-digit' })}</div>
          </div>
        `;
      });
      // کلیک روی هر شهر
      document.querySelectorAll('.city-card').forEach(card => {
        card.addEventListener('click', () => {
          const city = card.dataset.city;
          const tz = card.dataset.tz;
          showCityModal(city, tz);
        });
      });
    }
    updateWorldCities();
    setInterval(updateWorldCities, 60000);

    // ==================== مدال شهر ====================
    function showCityModal(city, tz) {
      const modal = document.getElementById('cityModal');
      document.getElementById('modalCityName').textContent = city;
      document.getElementById('closeModal').onclick = () => modal.classList.remove('active');
      modal.classList.add('active');
      // بروزرسانی داخل مدال
      function updateModal() {
        const now = new Date();
        const cityTime = new Date(now.toLocaleString('en-US', { timeZone: tz }));
        document.getElementById('modalTime').textContent = cityTime.toLocaleTimeString('fa-IR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        document.getElementById('modalDate').textContent = 
          new Intl.DateTimeFormat('fa-IR', { dateStyle:'full' }).format(cityTime) + ' | ' +
          cityTime.toLocaleDateString('en-US', { dateStyle:'full' });
        drawModalAnalog(cityTime);
      }
      updateModal();
      const interval = setInterval(updateModal, 1000);
      document.getElementById('closeModal').addEventListener('click', () => clearInterval(interval), { once: true });
    }

    function drawModalAnalog(date) {
      const canvas = document.getElementById('modalAnalog');
      const ctx = canvas.getContext('2d');
      const w = canvas.width, cx = w/2, cy = w/2, r = w/2 - 8;
      ctx.clearRect(0,0,w,w);
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(212,175,55,0.7)';
      ctx.lineWidth = 3;
      ctx.stroke();
      const h = date.getHours() % 12;
      const m = date.getMinutes();
      const s = date.getSeconds();
      drawHand(ctx, cx, cy, (h*30 + m*0.5) * Math.PI/180, r*0.45, 3, '#f8fafc');
      drawHand(ctx, cx, cy, m*6 * Math.PI/180, r*0.65, 2, '#e2e8f0');
      drawHand(ctx, cx, cy, s*6 * Math.PI/180, r*0.75, 1, '#d4af37', true);
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, 2*Math.PI);
      ctx.fillStyle = '#fff';
      ctx.fill();
    }

    // ==================== ساعت دیجیتال ====================
    function updateDigital() {
      const now = new Date();
      document.getElementById('digitalTime').textContent = now.toLocaleTimeString('fa-IR', { hour:'2-digit', minute:'2-digit' });
      document.getElementById('digitalDate').textContent = new Intl.DateTimeFormat('fa-IR', { dateStyle:'full' }).format(now);
    }
    updateDigital();
    setInterval(updateDigital, 1000);

    // ==================== نقل‌قول ====================
    let quoteIndex = -1, remainingQuotes = [];
    function resetQuotes() {
      if (typeof quotes !== 'undefined' && Array.isArray(quotes)) {
        remainingQuotes = [...quotes].sort(() => Math.random() - 0.5);
      } else {
        remainingQuotes = [{ text:'هر لحظه، آغازی تازه است.', author:'ناشناس' }];
      }
      quoteIndex = 0;
    }
    function getNextQuote() {
      if (quoteIndex >= remainingQuotes.length) {
        remainingQuotes = [...remainingQuotes].sort(() => Math.random() - 0.5);
        quoteIndex = 0;
      }
      return remainingQuotes[quoteIndex++];
    }
    function showQuote() {
      const q = getNextQuote();
      document.getElementById('quoteText').textContent = q.text;
      document.getElementById('quoteAuthor').textContent = q.author && q.author !== 'ناشناس' ? `— ${q.author}` : '';
    }
    resetQuotes();
    showQuote();
    setInterval(showQuote, 60000);
    document.getElementById('nextQuoteBtn').addEventListener('click', showQuote);

    // ==================== تم‌ها (انتخاب با دکمه کوچک در گوشه) ====================
    // یک دکمهٔ کوچک برای سوییچ تم اضافه می‌کنیم
    const themeBtn = document.createElement('button');
    themeBtn.textContent = '🎨';
    themeBtn.style.cssText = 'position:fixed; top:1rem; right:1rem; z-index:50; background:var(--glass); border:1px solid var(--border); color:var(--text); border-radius:50%; width:40px; height:40px; backdrop-filter:blur(10px); cursor:pointer; font-size:1.2rem;';
    document.body.appendChild(themeBtn);
    const themes = ['default', 'ice', 'purple', 'emerald'];
    let currentTheme = localStorage.getItem('goodtime-theme') || 'default';
    function setTheme(t) {
      document.body.setAttribute('data-theme', t === 'default' ? '' : t);
      localStorage.setItem('goodtime-theme', t);
    }
    setTheme(currentTheme);
    themeBtn.addEventListener('click', () => {
      const idx = themes.indexOf(currentTheme);
      const next = themes[(idx + 1) % themes.length];
      currentTheme = next;
      setTheme(next);
    });
  </script>
</body>
</html>
