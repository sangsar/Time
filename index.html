<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my time вң§ ШіШ§Ш№ШӘ Щ…ЩҶ</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cinzel:wght@400;500;600;700&family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --deep-space: #0a0a14;
            --star-gold: #d4a853;
            --glass-blur: blur(12px);
            --transition-smooth: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', 'Cormorant Garamond', sans-serif;
            min-height: 100vh;
            background: #0a0a14;
            color: #e8e4f0;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        /* в”Җв”Җв”Җ Щ„Ш§ЫҢЩҮ ЩҫШівҖҢШІЩ…ЫҢЩҶЩҮ в”Җв”Җв”Җ */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 1.2s ease-in-out;
            will-change: opacity, background-image;
        }
        .bg-layer.layer-a {
            z-index: -3;
            opacity: 1;
        }
        .bg-layer.layer-b {
            z-index: -2;
            opacity: 0;
        }
        .bg-layer.fading-out {
            opacity: 0;
        }
        .bg-layer.fading-in {
            opacity: 1;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at center,
                    rgba(10, 10, 25, 0.35) 0%,
                    rgba(5, 5, 18, 0.55) 40%,
                    rgba(2, 2, 10, 0.78) 100%);
            pointer-events: none;
        }

        /* в”Җв”Җв”Җ Ш°ШұШ§ШӘ Ъ©ЫҢЩҮШ§ЩҶЫҢ в”Җв”Җв”Җ */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* в”Җв”Җв”Җ Ъ©Ш§ЩҶШӘЫҢЩҶШұ Ш§ШөЩ„ЫҢ в”Җв”Җв”Җ */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px 40px;
        }

        /* в”Җв”Җв”Җ ЩҮШҜШұ ЩҲ Щ„ЩҲЪҜЩҲ в”Җв”Җв”Җ */
        .header {
            text-align: center;
            padding: 24px 20px 16px;
            position: relative;
        }
        .logo-text {
            font-family: 'Playfair Display', 'Cinzel', serif;
            font-size: 3.8rem;
            font-weight: 700;
            letter-spacing: 6px;
            background: linear-gradient(180deg, #f0e0c0 0%, #d4a853 35%, #b8923e 60%, #d4a853 80%, #f0e0c0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            filter: drop-shadow(0 3px 12px rgba(180, 140, 70, 0.55));
            font-style: italic;
            line-height: 1.1;
            animation: logoGlow 4s ease-in-out infinite;
        }
        @keyframes logoGlow {
            0%,
            100% {
                filter: drop-shadow(0 3px 12px rgba(180, 140, 70, 0.55));
            }
            50% {
                filter: drop-shadow(0 3px 24px rgba(212, 168, 83, 0.85));
            }
        }
        .logo-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            letter-spacing: 9px;
            color: #b8a080;
            text-transform: uppercase;
            margin-top: 2px;
            font-style: italic;
        }
        .logo-divider {
            width: 140px;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, #d4a853, transparent);
            margin: 10px auto 0;
            border-radius: 2px;
        }

        /* в”Җв”Җв”Җ ШҙШЁЪ©ЩҮ ШіШ§Ш№ШӘвҖҢЩҮШ§ в”Җв”Җв”Җ */
        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-top: 20px;
            padding: 0 6px;
        }

        .clock-card {
            position: relative;
            border-radius: 20px;
            padding: 22px 14px 16px;
            text-align: center;
            transition: all var(--transition-smooth);
            cursor: default;
            overflow: hidden;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            min-height: 155px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
        }

        .clock-card.day-mode {
            background: linear-gradient(135deg,
                    rgba(255, 252, 248, 0.6) 0%,
                    rgba(240, 235, 225, 0.5) 30%,
                    rgba(255, 250, 242, 0.65) 70%,
                    rgba(245, 238, 228, 0.55) 100%);
            border: 1.5px solid rgba(200, 180, 140, 0.5);
            color: #1a1a2e;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1),
                0 0 0 1px rgba(220, 200, 160, 0.3) inset,
                0 0 30px rgba(200, 170, 120, 0.15);
        }
        .clock-card.night-mode {
            background: linear-gradient(135deg,
                    rgba(10, 10, 28, 0.6) 0%,
                    rgba(6, 6, 20, 0.5) 30%,
                    rgba(14, 14, 32, 0.65) 70%,
                    rgba(8, 8, 24, 0.55) 100%);
            border: 1.5px solid rgba(120, 150, 210, 0.4);
            color: #e8e4f0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35),
                0 0 0 1px rgba(120, 150, 210, 0.2) inset,
                0 0 30px rgba(80, 120, 200, 0.12);
        }
        .clock-card.day-mode .city-name {
            color: #3a3028;
        }
        .clock-card.night-mode .city-name {
            color: #c8d8f0;
        }
        .clock-card.day-mode .time-display {
            color: #1a1a2e;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 10px;
            padding: 4px 12px;
        }
        .clock-card.night-mode .time-display {
            color: #f0ecff;
            text-shadow: 0 0 16px rgba(150, 180, 230, 0.45);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 4px 12px;
        }
        .clock-card.day-mode .country-name {
            color: #6b5d4f;
        }
        .clock-card.night-mode .country-name {
            color: #8899bb;
        }
        .clock-card.day-mode .date-display {
            color: #5a4e42;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 8px;
            padding: 2px 8px;
        }
        .clock-card.night-mode .date-display {
            color: #8899bb;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 2px 8px;
        }
        .clock-card.day-mode .daynight-indicator {
            background: rgba(255, 245, 230, 0.7);
            color: #8b6914;
            border: 1px solid #e8d5a3;
        }
        .clock-card.night-mode .daynight-indicator {
            background: rgba(20, 20, 45, 0.7);
            color: #aac4ee;
            border: 1px solid #334466;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            z-index: 5;
        }
        .clock-card.day-mode:hover {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18),
                0 0 0 1px rgba(220, 190, 140, 0.5) inset,
                0 0 40px rgba(200, 170, 120, 0.25);
        }
        .clock-card.night-mode:hover {
            box-shadow: 0 12px 40px rgba(80, 130, 210, 0.3),
                0 0 0 1px rgba(130, 160, 220, 0.4) inset,
                0 0 50px rgba(80, 120, 200, 0.2);
        }

        .city-name {
            font-family: 'Playfair Display', 'Vazirmatn', serif;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 1.5px;
        }
        .time-display {
            font-family: 'Cinzel', 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            line-height: 1.2;
        }
        .country-name {
            font-family: 'Cormorant Garamond', 'Vazirmatn', serif;
            font-size: 0.78rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-style: italic;
            opacity: 0.8;
        }
        .date-display {
            font-family: 'Vazirmatn', 'Cormorant Garamond', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            opacity: 0.75;
            direction: ltr;
            display: inline-block;
        }
        .date-display .shamsi-date {
            display: block;
            font-size: 0.65rem;
            opacity: 0.7;
            margin-top: 1px;
        }
        .daynight-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .daynight-icon {
            font-size: 1rem;
        }

        /* в”Җв”Җв”Җ Ъ©Ш§ШұШӘ ЩҲЫҢЪҳЩҮ Ш§ЫҢШұШ§ЩҶ в”Җв”Җв”Җ */
        .clock-card.iran-featured {
            border: 2px solid rgba(212, 168, 83, 0.55) !important;
            box-shadow: 0 0 25px rgba(212, 168, 83, 0.2) !important;
        }

        /* в”Җв”Җв”Җ ШЁШ®Шҙ ЩҶЩӮЩ„вҖҢЩӮЩҲЩ„ ШҙЫҢЪ© в”Җв”Җв”Җ */
        .quote-section {
            margin-top: 36px;
            text-align: center;
            padding: 10px 20px;
        }
        .quote-container {
            display: inline-block;
            max-width: 620px;
            width: 90%;
            background: rgba(18, 18, 40, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(180, 160, 120, 0.2);
            border-radius: 14px;
            padding: 20px 28px;
            transition: all 0.6s ease;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.35);
            position: relative;
            overflow: hidden;
        }
        .quote-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 168, 83, 0.4), transparent);
        }
        .quote-container:hover {
            border-color: rgba(200, 170, 130, 0.45);
            box-shadow: 0 8px 40px rgba(100, 130, 200, 0.15);
            transform: translateY(-2px);
        }
        .quote-text {
            font-family: 'Vazirmatn', 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-style: italic;
            color: #e8e0d8;
            letter-spacing: 0.5px;
            line-height: 1.9;
            transition: opacity 0.4s ease;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .quote-fade {
            animation: quoteFadeIn 0.5s ease;
        }
        @keyframes quoteFadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .quote-counter {
            font-size: 0.6rem;
            color: #887766;
            letter-spacing: 2px;
            margin-top: 4px;
            font-family: 'Cormorant Garamond', serif;
            opacity: 0.6;
        }

        /* в”Җв”Җв”Җ ЩҒЩҲШӘШұ в”Җв”Җв”Җ */
        .footer {
            text-align: center;
            padding: 18px;
            font-size: 0.68rem;
            color: #665544;
            letter-spacing: 3px;
            opacity: 0.5;
            font-family: 'Cormorant Garamond', serif;
        }

        /* в”Җв”Җв”Җ ШұЫҢШіЩҫШ§ЩҶШіЫҢЩҲ в”Җв”Җв”Җ */
        @media (max-width: 1200px) {
            .clocks-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            .logo-text {
                font-size: 3rem;
            }
            .time-display {
                font-size: 1.8rem;
            }
        }
        @media (max-width: 900px) {
            .clocks-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .time-display {
                font-size: 1.5rem;
            }
            .logo-text {
                font-size: 2.4rem;
            }
        }
        @media (max-width: 600px) {
            .clocks-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .time-display {
                font-size: 1.25rem;
            }
            .logo-text {
                font-size: 2rem;
            }
            .quote-text {
                font-size: 1rem;
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a18;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3040;
            border-radius: 3px;
        }

        .bg-fallback {
            background: radial-gradient(ellipse at 30% 40%, #1a1030 0%, #0a0a18 50%, #020210 100%) !important;
        }
    </style>
</head>
<body>

    <!-- Щ„Ш§ЫҢЩҮвҖҢЩҮШ§ЫҢ ЩҫШівҖҢШІЩ…ЫҢЩҶЩҮ -->
    <div class="bg-layer layer-a" id="bgLayerA"></div>
    <div class="bg-layer layer-b" id="bgLayerB"></div>
    <div class="bg-overlay"></div>

    <!-- Ш°ШұШ§ШӘ Ъ©ЫҢЩҮШ§ЩҶЫҢ -->
    <canvas id="particles-canvas"></canvas>

    <!-- Ъ©Ш§ЩҶШӘЫҢЩҶШұ Ш§ШөЩ„ЫҢ -->
    <div class="main-container">

        <!-- ЩҮШҜШұ ЩҲ Щ„ЩҲЪҜЩҲ -->
        <header class="header">

        <!-- ШЁШ®Шҙ ЩҶЩӮЩ„вҖҢЩӮЩҲЩ„ -->
        <div class="quote-section">

        <footer class="footer">

    </div>

    <!-- в”Җв”Җв”Җ ЩҒШ§ЫҢЩ„ quotes.js ШЁШ§ЫҢШҜ Ш§ЫҢЩҶШ¬Ш§ ШЁШ§ШҙЩҮ в”Җв”Җв”Җ -->
    <script src="quotes.js"></script>

    <script>
        (function() {
            // в”Җв”Җв”Җ ШӘЩҶШёЫҢЩ…Ш§ШӘ в”Җв”Җв”Җ
            const BACKGROUND_CHANGE_INTERVAL = 90 * 1000;
            const QUOTE_CHANGE_INTERVAL = 20000;
            const CLOCK_UPDATE_INTERVAL = 1000;

            // в”Җв”Җв”Җ Ъ©ШҙЩҲШұЩҮШ§ в”Җв”Җв”Җ
            const countries = [
                { city: 'ШӘЩҮШұШ§ЩҶ', country: 'Ш§ЫҢШұШ§ЩҶ', timezone: 'Asia/Tehran', featured: true,
                useShamsi: true },
                { city: 'New York', country: 'USA', timezone: 'America/New_York', featured: false,
                    useShamsi: false },
                { city: 'London', country: 'UK', timezone: 'Europe/London', featured: false,

                { city: 'Paris', country: 'France', timezone: 'Europe/Paris', featured: false,
                useShamsi: false },
                { city: 'Berlin', country: 'Germany', timezone: 'Europe/Berlin', featured: false,
                    useShamsi: false },
                { city: 'Tokyo', country: 'Japan', timezone: 'Asia/Tokyo', featured: false,
                useShamsi: false },
                { city: 'Beijing', country: 'China', timezone: 'Asia/Shanghai', featured: false,
                    useShamsi: false },
                { city: 'Sydney', country: 'Australia', timezone: 'Australia/Sydney', featured: false,
                    useShamsi: false },
                { city: 'Moscow', country: 'Russia', timezone: 'Europe/Moscow', featured: false,
                    useShamsi: false },
                { city: 'BrasГӯlia', country: 'Brazil', timezone: 'America/Sao_Paulo', featured: false,
                    useShamsi: false },
                { city: 'New Delhi', country: 'India', timezone: 'Asia/Kolkata', featured: false,
                    useShamsi: false },
                { city: 'Toronto', country: 'Canada', timezone: 'America/Toronto', featured: false,
                    useShamsi: false },
                { city: 'Seoul', country: 'South Korea', timezone: 'Asia/Seoul', featured: false,
                    useShamsi: false },
                { city: 'Dubai', country: 'UAE', timezone: 'Asia/Dubai', featured: false,
                useShamsi: false },
                { city: 'Johannesburg', country: 'South Africa', timezone: 'Africa/Johannesburg',
                    featured: false, useShamsi: false },
            ];

            // в”Җв”Җв”Җ Ш№Ъ©ШівҖҢЩҮШ§ЫҢ ЩҫЫҢШҙвҖҢЩҒШұШ¶ ЩҶШ§ШіШ§ (ЩҒЩҲШұЫҢ Щ„ЩҲШҜ Щ…ЫҢвҖҢШҙЩҶ) в”Җв”Җв”Җ
            const DEFAULT_NASA_IMAGES = [
                'https://apod.nasa.gov/apod/image/2312/ConeNebula_Hubble_960.jpg',
                'https://apod.nasa.gov/apod/image/2310/OrionNebula_Jones_960.jpg',
                'https://apod.nasa.gov/apod/image/2309/VeilNebula_Hubble_960.jpg',
                'https://apod.nasa.gov/apod/image/2308/RingNebula_Webb_960.jpg',
                'https://apod.nasa.gov/apod/image/2307/EagleNebula_Hubble_960.jpg',
                'https://apod.nasa.gov/apod/image/2306/M51_Webb_960.jpg',
            ];

            // в”Җв”Җв”Җ DOM References в”Җв”Җв”Җ
            const bgLayerA = document.getElementById('bgLayerA');
            const bgLayerB = document.getElementById('bgLayerB');
            const clocksGrid = document.getElementById('clocksGrid');
            const quoteText = document.getElementById('quoteText');
            const quoteCounter = document.getElementById('quoteCounter');
            const particlesCanvas = document.getElementById('particles-canvas');
            const ctx = particlesCanvas.getContext('2d');

            // в”Җв”Җв”Җ state в”Җв”Җв”Җ
            let activeLayer = 'A';
            let quoteIndex = 0;
            let clockCards = [];
            let bgRotationTimer = null;
            let quoteTimer = null;
            let clockTimer = null;
            let animationFrameId = null;
            let particles = [];
            let allBgImages = [...DEFAULT_NASA_IMAGES];
            let currentBgIndex = 0;

            // в”Җв”Җв”Җ ШӘШЁШҜЫҢЩ„ ШӘШ§ШұЫҢШ® Щ…ЫҢЩ„Ш§ШҜЫҢ ШЁЩҮ ШҙЩ…ШіЫҢ в”Җв”Җв”Җ
            function gregorianToJalali(gDate) {
                const gYear = gDate.getFullYear();
                const gMonth = gDate.getMonth() + 1;
                const gDay = gDate.getDate();
                const gDaysInMonth = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
                const jDaysInMonth = [31, 31, 31, 31, 31, 31, 30, 29, 29, 29, 29, 29];

                let gy = gYear - 1600;
                let gm = gMonth - 1;
                let gd = gDay - 1;
                let gDayNo = 365 * gy + Math.floor((gy + 3) / 4) - Math.floor((gy + 99) / 100) + Math.floor((gy +
                    399) / 400);
                for (let i = 0; i < gm; i++) gDayNo += gDaysInMonth[i];
                if (gm > 1 && ((gy % 4 === 0 && gy % 100 !== 0) || (gy % 400 === 0))) gDayNo++;
                gDayNo += gd;

                let jDayNo = gDayNo - 79;
                let jNp = Math.floor(jDayNo / 12053);
                jDayNo %= 12053;
                let jy = 979 + 33 * jNp + 4 * Math.floor(jDayNo / 1461);
                jDayNo %= 1461;
                if (jDayNo >= 366) { jy += Math.floor((jDayNo - 1) / 365);
                    jDayNo = (jDayNo - 1) % 365; }

                let jm = 0;
                for (let i = 0; i < 11; i++) {
                    if (jDayNo >= jDaysInMonth[i]) { jDayNo -= jDaysInMonth[i];
                        jm++; } else break;
                }
                const monthNames = ['ЩҒШұЩҲШұШҜЫҢЩҶ', 'Ш§ШұШҜЫҢШЁЩҮШҙШӘ', 'Ш®ШұШҜШ§ШҜ', 'ШӘЫҢШұ', 'Щ…ШұШҜШ§ШҜ', 'ШҙЩҮШұЫҢЩҲШұ', 'Щ…ЩҮШұ', 'ШўШЁШ§ЩҶ', 'ШўШ°Шұ', 'ШҜЫҢ',
                    'ШЁЩҮЩ…ЩҶ', 'Ш§ШіЩҒЩҶШҜ'
                ];
                return `${jDayNo + 1} ${monthNames[jm]} ${jy}`;
            }

            // в”Җв”Җв”Җ ШӘЩҶШёЫҢЩ… ЩҫШівҖҢШІЩ…ЫҢЩҶЩҮ в”Җв”Җв”Җ
            function setBackground(imageUrl, layerElement) {
                if (imageUrl) {
                    layerElement.style.backgroundImage = `url('${imageUrl}')`;
                    layerElement.style.backgroundSize = 'cover';
                    layerElement.style.backgroundPosition = 'center';
                    layerElement.classList.remove('bg-fallback');
                } else {
                    layerElement.classList.add('bg-fallback');
                }
            }

            function rotateBackground() {
                if (allBgImages.length === 0) return;
                currentBgIndex = (currentBgIndex + 1) % allBgImages.length;
                const nextImage = allBgImages[currentBgIndex];

                if (activeLayer === 'A') {
                    setBackground(nextImage, bgLayerB);
                    bgLayerB.classList.add('fading-in');
                    bgLayerB.classList.remove('fading-out');
                    bgLayerA.classList.add('fading-out');
                    bgLayerA.classList.remove('fading-in');
                    activeLayer = 'B';
                } else {
                    setBackground(nextImage, bgLayerA);
                    bgLayerA.classList.add('fading-in');
                    bgLayerA.classList.remove('fading-out');
                    bgLayerB.classList.add('fading-out');
                    bgLayerB.classList.remove('fading-in');
                    activeLayer = 'A';
                }
            }

            // в”Җв”Җв”Җ ШҜШұЫҢШ§ЩҒШӘ ШІЩ…Ш§ЩҶ Щ…ШӯЩ„ЫҢ в”Җв”Җв”Җ
            function getLocalTimeData(timezone, useShamsi) {
                try {
                    const now = new Date();
                    const optionsTime = { timeZone: timezone, hour: '2-digit', minute: '2-digit',
                        hour12: false };
                    const optionsDate = { timeZone: timezone, weekday: 'short', year: 'numeric',
                        month: 'short', day: 'numeric' };

                    const timeStr = now.toLocaleString('en-US', optionsTime);
                    const dateStr = now.toLocaleString('en-US', optionsDate);
                    const parts = timeStr.split(':');
                    const hours = parts[0].padStart(2, '0');
                    const minutes = parts[1].padStart(2, '0');
                    const hourNum = parseInt(hours, 10);

                    let shamsiDate = '';
                    if (useShamsi) {
                        try {
                            const dateInZone = new Date(now.toLocaleString('en-US', { timeZone: timezone }));
                            shamsiDate = gregorianToJalali(dateInZone);
                        } catch (e) {}
                    }

                    return { hours, minutes, hourNum, timeStr: `${hours}:${minutes}`, dateStr, shamsiDate,
                        isDay: hourNum >= 6 && hourNum < 18 };
                } catch (e) {
                    const now = new Date();
                    return {
                        hours: String(now.getHours()).padStart(2, '0'),
                        minutes: String(now.getMinutes()).padStart(2, '0'),
                        hourNum: now.getHours(),
                        timeStr: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
                        dateStr: now.toLocaleDateString('en-US', { weekday: 'short', month: 'short',
                            day: 'numeric' }),
                        shamsiDate: useShamsi ? gregorianToJalali(now) : '',
                        isDay: now.getHours() >= 6 && now.getHours() < 18
                    };
                }
            }

            // в”Җв”Җв”Җ ШіШ§Ш®ШӘ Ъ©Ш§ШұШӘвҖҢЩҮШ§ЫҢ ШіШ§Ш№ШӘ в”Җв”Җв”Җ
            function createClockCards() {
                clocksGrid.innerHTML = '';
                clockCards = [];

                countries.forEach((country) => {
                    const card = document.createElement('div');
                    card.className = 'clock-card';
                    if (country.featured) card.classList.add('iran-featured');

                    card.innerHTML = `
                        <div class="city-name">${country.city}</div>
                        <div class="time-display"><span class="time-main">--:--</span></div>
                        <div class="country-name">${country.country}</div>
                        <div class="date-display">
                            <span class="gregorian-date">---</span>
                            ${country.useShamsi ? '<span class="shamsi-date"></span>' : ''}
                        </div>
                        <div class="daynight-indicator">
                            <span class="daynight-icon">вҳҖпёҸ</span>
                            <span class="daynight-label">---</span>
                        </div>
                    `;

                    clocksGrid.appendChild(card);
                    clockCards.push({
                        element: card,
                        timezone: country.timezone,
                        useShamsi: country.useShamsi,
                        timeMainEl: card.querySelector('.time-main'),
                        daynightIcon: card.querySelector('.daynight-icon'),
                        daynightLabel: card.querySelector('.daynight-label'),
                        gregorianDateEl: card.querySelector('.gregorian-date'),
                        shamsiDateEl: card.querySelector('.shamsi-date'),
                    });
                });
            }

            // в”Җв”Җв”Җ ШЁЩҮвҖҢШұЩҲШІШұШіШ§ЩҶЫҢ ШіШ§Ш№ШӘвҖҢЩҮШ§ в”Җв”Җв”Җ
            function updateAllClocks() {
                clockCards.forEach(card => {
                    const data = getLocalTimeData(card.timezone, card.useShamsi);
                    card.timeMainEl.textContent = `${data.hours}:${data.minutes}`;

                    const isDay = data.isDay;
                    card.element.classList.remove('day-mode', 'night-mode');
                    card.element.classList.add(isDay ? 'day-mode' : 'night-mode');

                    card.daynightIcon.textContent = isDay ? 'вҳҖпёҸ' : 'рҹҢҷ';
                    card.daynightLabel.textContent = isDay ? 'ШұЩҲШІ В· Day' : 'ШҙШЁ В· Night';

                    if (card.gregorianDateEl) card.gregorianDateEl.textContent = data.dateStr;
                    if (card.shamsiDateEl && card.useShamsi) card.shamsiDateEl.textContent = data
                        .shamsiDate || '';
                });
            }

            // в”Җв”Җв”Җ ЩҶЩӮЩ„вҖҢЩӮЩҲЩ„вҖҢЩҮШ§ в”Җв”Җв”Җ
            function updateQuote() {
                if (!window.quotes || !Array.isArray(window.quotes) || window.quotes.length === 0) {
                    quoteText.textContent = 'вҡ пёҸ ЩҒШ§ЫҢЩ„ quotes.js ШҜШұ Ъ©ЩҶШ§Шұ index.html ЩӮШұШ§Шұ ШҜШ§ШҜЩҮ ЩҶШҙШҜЩҮ Ш§ШіШӘ';
                    quoteCounter.textContent = '';
                    return;
                }

                if (quoteIndex >= window.quotes.length) quoteIndex = 0;
                quoteText.textContent = window.quotes[quoteIndex];
                quoteText.classList.remove('quote-fade');
                void quoteText.offsetWidth;
                quoteText.classList.add('quote-fade');
                quoteCounter.textContent = `${quoteIndex + 1} Ш§ШІ ${window.quotes.length}`;
                quoteIndex++;
            }

            // в”Җв”Җв”Җ Ш°ШұШ§ШӘ Ъ©ЫҢЩҮШ§ЩҶЫҢ в”Җв”Җв”Җ
            function resizeCanvas() {
                particlesCanvas.width = window.innerWidth;
                particlesCanvas.height = window.innerHeight;
            }

            function createParticles() {
                const count = Math.min(Math.floor(window.innerWidth * 0.08), 120);
                particles = [];
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * particlesCanvas.width,
                        y: Math.random() * particlesCanvas.height,
                        radius: Math.random() * 2.2 + 0.4,
                        speedX: (Math.random() - 0.5) * 0.25,
                        speedY: -(Math.random() * 0.4 + 0.15),
                        opacity: Math.random() * 0.7 + 0.15,
                        twinkleSpeed: Math.random() * 0.015 + 0.005,
                        twinkleOffset: Math.random() * Math.PI * 2,
                    });
                }
            }

            function animateParticles(timestamp) {
                ctx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);
                particles.forEach(p => {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    p.opacity += Math.sin(timestamp * p.twinkleSpeed + p.twinkleOffset) * 0.008;
                    p.opacity = Math.max(0.08, Math.min(0.85, p.opacity));
                    if (p.y < -10) { p.y = particlesCanvas.height + 10;
                        p.x = Math.random() * particlesCanvas.width; }
                    if (p.x < -10) p.x = particlesCanvas.width + 10;
                    if (p.x > particlesCanvas.width + 10) p.x = -10;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 3);
                    gradient.addColorStop(0, `rgba(220,210,255,${p.opacity})`);
                    gradient.addColorStop(0.4, `rgba(180,170,220,${p.opacity * 0.6})`);
                    gradient.addColorStop(1, 'rgba(100,90,160,0)');
                    ctx.fillStyle = gradient;
                    ctx.fill();
                });
                animationFrameId = requestAnimationFrame(animateParticles);
            }

            // в”Җв”Җв”Җ ШұШ§ЩҮвҖҢШ§ЩҶШҜШ§ШІЫҢ ЩҒЩҲШұЫҢ в”Җв”Җв”Җ
            function init() {
                // 1. ШӘЩҶШёЫҢЩ… Ш§ЩҲЩ„ЫҢЩҶ Ш№Ъ©Ші ЩҫШівҖҢШІЩ…ЫҢЩҶЩҮ (ЩҒЩҲШұЫҢ Ш§ШІ Ш№Ъ©ШівҖҢЩҮШ§ЫҢ ЩҫЫҢШҙвҖҢЩҒШұШ¶ ЩҶШ§ШіШ§)
                setBackground(DEFAULT_NASA_IMAGES[0], bgLayerA);
                bgLayerA.classList.add('fading-in');
                currentBgIndex = 0;

                // 2. Ш°ШұШ§ШӘ
                resizeCanvas();
                createParticles();
                animationFrameId = requestAnimationFrame(animateParticles);

                // 3. ШіШ§Ш®ШӘ Ъ©Ш§ШұШӘвҖҢЩҮШ§ ЩҲ ШЁШұЩҲШІШұШіШ§ЩҶЫҢ
                createClockCards();
                updateAllClocks();

                // 4. ЩҶЩӮЩ„вҖҢЩӮЩҲЩ„вҖҢЩҮШ§ - ЩҒЩҲШұЫҢ Ш§ШІ quotes.js
                if (window.quotes && window.quotes.length > 0) {
                    updateQuote();
                    console.log('вң… ' + window.quotes.length + ' ЩҶЩӮЩ„вҖҢЩӮЩҲЩ„ Ш§ШІ quotes.js ШЁШ§ШұЪҜШ°Ш§ШұЫҢ ШҙШҜ');
                } else {
                    quoteText.textContent = 'вҡ пёҸ ЩҒШ§ЫҢЩ„ quotes.js ШұШ§ ШҜШұ Ъ©ЩҶШ§Шұ index.html ЩӮШұШ§Шұ ШҜЩҮЫҢШҜ';
                    quoteCounter.textContent = '';
                    console.warn('вҡ пёҸ quotes.js ЫҢШ§ЩҒШӘ ЩҶШҙШҜ ЫҢШ§ Ш®Ш§Щ„ЫҢ Ш§ШіШӘ');
                }

                // 5. ШӘШ§ЫҢЩ…ШұЩҮШ§
                clockTimer = setInterval(updateAllClocks, CLOCK_UPDATE_INTERVAL);
                quoteTimer = setInterval(updateQuote, QUOTE_CHANGE_INTERVAL);
                bgRotationTimer = setInterval(rotateBackground, BACKGROUND_CHANGE_INTERVAL);

                // 6. ШӘЩ„Ш§Шҙ ШЁШұШ§ЫҢ ШҜШұЫҢШ§ЩҒШӘ Ш№Ъ©ШівҖҢЩҮШ§ЫҢ ШЁЫҢШҙШӘШұ Ш§ШІ ЩҶШ§ШіШ§ (ШҜШұ ЩҫШівҖҢШІЩ…ЫҢЩҶЩҮ)
                fetchMoreNASAImages();

                window.addEventListener('resize', () => { resizeCanvas();
                    createParticles(); });
            }

            // в”Җв”Җв”Җ ШҜШұЫҢШ§ЩҒШӘ Ш№Ъ©ШівҖҢЩҮШ§ЫҢ ШЁЫҢШҙШӘШұ Ш§ШІ ЩҶШ§ШіШ§ ШҜШұ ЩҫШівҖҢШІЩ…ЫҢЩҶЩҮ в”Җв”Җв”Җ
            async function fetchMoreNASAImages() {
                try {
                    const response = await fetch(
                        'https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY&count=8&thumbs=true');
                    if (!response.ok) return;
                    const data = await response.json();
                    const newImages = data
                        .filter(item => item.media_type === 'image' && (item.hdurl || item.url))
                        .map(item => item.hdurl || item.url);

                    if (newImages.length > 0) {
                        // Ш§Ш¶Ш§ЩҒЩҮ Ъ©ШұШҜЩҶ ШЁЩҮ Щ„ЫҢШіШӘ
                        allBgImages = [...DEFAULT_NASA_IMAGES, ...newImages];
                        console.log('вң… ' + newImages.length + ' Ш№Ъ©Ші Ш¬ШҜЫҢШҜ Ш§ШІ NASA APOD ШҜШұЫҢШ§ЩҒШӘ ШҙШҜ');
                    }
                } catch (e) {
                    console.log('NASA API ШҜШұ ЩҫШівҖҢШІЩ…ЫҢЩҶЩҮ ШҜШұ ШҜШіШӘШұШі ЩҶЫҢШіШӘШҢ Ш§ШІ Ш№Ъ©ШівҖҢЩҮШ§ЫҢ ЩҫЫҢШҙвҖҢЩҒШұШ¶ Ш§ШіШӘЩҒШ§ШҜЩҮ Щ…ЫҢвҖҢШҙЩҲШҜ');
                }
            }

            // в”Җв”Җв”Җ ШҙШұЩҲШ№ в”Җв”Җв”Җ
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // в”Җв”Җв”Җ ЩҫШ§Ъ©вҖҢШіШ§ШІЫҢ в”Җв”Җв”Җ
            window.addEventListener('beforeunload', () => {
                if (clockTimer) clearInterval(clockTimer);
                if (quoteTimer) clearInterval(quoteTimer);
                if (bgRotationTimer) clearInterval(bgRotationTimer);
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
            });

            console.log('рҹҢҢ my time вҖ” ШўЩ…Ш§ШҜЩҮ вңҰ');
        })();
    </script>
</body>
</html>
