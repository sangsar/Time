<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Æternum | داشبورد کیهانی</title>
  <meta name="description" content="ساعت هوشمند جهانی با کره زمین سه‌بعدی و کیفیت بصری بی‌نهایت">
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
  <style>
    :root {
      --bg: #02040a;
      --glass: rgba(15, 15, 25, 0.5);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f0f0f5;
      --accent: #60a5fa;
    }
    [data-theme="golden"] { --accent: #fbbf24; }
    [data-theme="ocean"] { --accent: #38bdf8; }
    [data-theme="cyberpunk"] { --accent: #ff2a6d; }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Vazirmatn', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* کرهٔ سه‌بعدی پس‌زمینه */
    #globe-container {
      position: fixed;
      top: 0; right: -10vw;
      width: 70vw; height: 100vh;
      z-index: 0;
    }
    /* UI شیشه‌ای */
    .ui-layer {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      pointer-events: none;
    }
    .left-panel {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2rem;
      pointer-events: auto;
      margin-top: auto;
      margin-bottom: auto;
      margin-right: 5vw;
    }
    
    /* ساعت فوق‌شیشه‌ای */
    .glass-clock {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 40px rgba(255,255,255,0.03);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .clock-face {
      width: 85%;
      height: 85%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent 60%);
      position: relative;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
    }
    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 4px;
      transition: transform 0.05s linear;
    }
    .hour-hand {
      width: 3px;
      height: 28%;
      background: #f8fafc;
      margin-left: -1.5px;
      box-shadow: 0 0 8px rgba(255,255,255,0.4);
    }
    .minute-hand {
      width: 2px;
      height: 38%;
      background: #e2e8f0;
      margin-left: -1px;
    }
    .second-hand {
      width: 1px;
      height: 44%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      z-index: 5;
    }
    .center-dot {
      position: absolute;
      top: 50%; left: 50%;
      width: 12px; height: 12px;
      background: white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
    }
    .digital-overlay {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
    }
    .digital-time {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
    }
    .digital-date {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 4px;
    }

    /* نقل‌قول */
    .quote-glass {
      background: var(--glass);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.5rem;
      max-width: 380px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .quote-text {
      font-style: italic;
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 0.5rem;
    }
    .quote-author {
      font-size: 0.8rem;
      opacity: 0.6;
      text-align: left;
    }
    .next-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      margin-top: 0.8rem;
      transition: 0.3s;
      backdrop-filter: blur(10px);
    }
    .next-btn:hover { background: rgba(255,255,255,0.2); border-color: white; }

    /* منوی تم */
    .theme-menu {
      position: fixed;
      top: 2rem;
      left: 2rem;
      z-index: 20;
      display: flex;
      gap: 0.5rem;
    }
    .theme-dot {
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.3s;
      backdrop-filter: blur(10px);
    }
    .theme-dot:hover { transform: scale(1.2); border-color: white; }
    .theme-dot.active { border-color: white; transform: scale(1.2); }

    @media (max-width: 900px) {
      #globe-container { width: 100vw; right: 0; height: 50vh; top: 0; }
      .left-panel { margin: 0; align-items: center; }
      .glass-clock { width: 260px; height: 260px; }
      .quote-glass { max-width: 90vw; }
    }
  </style>
</head>
<body>

  <!-- منوی تم -->
  <div class="theme-menu">
    <span class="theme-dot active" data-theme="default" style="background:#60a5fa;"></span>
    <span class="theme-dot" data-theme="golden" style="background:#fbbf24;"></span>
    <span class="theme-dot" data-theme="ocean" style="background:#38bdf8;"></span>
    <span class="theme-dot" data-theme="cyberpunk" style="background:#ff2a6d;"></span>
  </div>

  <div id="globe-container"></div>

  <div class="ui-layer">
    <div class="left-panel">
      <!-- ساعت فوق‌شیشه‌ای -->
      <div class="glass-clock">
        <div class="clock-face" id="clockFace">
          <div class="hand hour-hand" id="hourHand"></div>
          <div class="hand minute-hand" id="minuteHand"></div>
          <div class="hand second-hand" id="secondHand"></div>
          <div class="center-dot"></div>
          <div class="digital-overlay">
            <div class="digital-time" id="digitalTime">--:--</div>
            <div class="digital-date" id="digitalDate">...</div>
          </div>
        </div>
      </div>

      <!-- نقل‌قول -->
      <div class="quote-glass">
        <div class="quote-text" id="quoteText">...</div>
        <div class="quote-author" id="quoteAuthor"></div>
        <button class="next-btn" id="nextQuoteBtn">جملهٔ بعدی ←</button>
      </div>
    </div>
  </div>

  <script src="quotes.js"></script>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ==================== کرهٔ سه‌بعدی با کیفیت بی‌نهایت ====================
    const container = document.getElementById('globe-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(1.5, 0.3, 2.2);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // نور خورشید
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
    sunLight.position.set(5, 2, 5);
    scene.add(sunLight);
    scene.add(new THREE.AmbientLight(0x333355));

    // بافت‌های باکیفیت ناسا
    const loader = new THREE.TextureLoader();
    const dayTexture = loader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
    const nightTexture = loader.load('https://threejs.org/examples/textures/planets/earth_lights_2048.png');
    const cloudsTexture = loader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');

    // شیدر سفارشی برای ترکیب روز و شب
    const earthGeo = new THREE.SphereGeometry(1.4, 128, 128);
    const earthMat = new THREE.ShaderMaterial({
      uniforms: {
        dayMap: { value: dayTexture },
        nightMap: { value: nightTexture },
        lightDirection: { value: sunLight.position.clone().normalize() }
      },
      vertexShader: `
        varying vec2 vUv;
        varying vec3 vNormal;
        varying vec3 vLightDir;
        void main() {
          vUv = uv;
          vec4 worldPos = modelMatrix * vec4(position, 1.0);
          vNormal = normalize(mat3(modelMatrix) * normal);
          vec4 lightDirWorld = vec4(normalize(lightDirection), 0.0);
          vLightDir = normalize(lightDirWorld.xyz);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        varying vec3 vNormal;
        varying vec3 vLightDir;
        uniform sampler2D dayMap;
        uniform sampler2D nightMap;
        void main() {
          float dotProduct = dot(vNormal, vLightDir);
          float mixFactor = smoothstep(-0.1, 0.4, dotProduct);
          vec4 dayColor = texture2D(dayMap, vUv);
          vec4 nightColor = texture2D(nightMap, vUv);
          // ترکیب روز و شب
          vec4 baseColor = mix(nightColor, dayColor, mixFactor);
          // اضافه کردن کمی روشنایی به قسمت شب برای دیده شدن شهرها
          gl_FragColor = vec4(baseColor.rgb * (0.6 + 0.4 * mixFactor), 1.0);
        }
      `
    });
    const earth = new THREE.Mesh(earthGeo, earthMat);
    scene.add(earth);

    // ابرها
    const cloudGeo = new THREE.SphereGeometry(1.41, 64, 64);
    const cloudMat = new THREE.MeshPhongMaterial({ map: cloudsTexture, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending });
    const clouds = new THREE.Mesh(cloudGeo, cloudMat);
    scene.add(clouds);

    // ستاره‌ها
    const starsGeo = new THREE.BufferGeometry();
    const starsPos = new Float32Array(2000 * 3);
    for (let i = 0; i < starsPos.length; i += 3) {
      starsPos[i] = (Math.random() - 0.5) * 20;
      starsPos[i+1] = (Math.random() - 0.5) * 12;
      starsPos[i+2] = (Math.random() - 0.5) * 10 - 2;
    }
    starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
    scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.018 })));

    // کنترل چرخش نرم
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.04;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.2;
    controls.enableZoom = false;
    controls.enablePan = false;

    function animate() {
      requestAnimationFrame(animate);
      clouds.rotation.y += 0.0003;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // ==================== ساعت فوق‌شیشه‌ای ====================
    const hourHand = document.getElementById('hourHand');
    const minuteHand = document.getElementById('minuteHand');
    const secondHand = document.getElementById('secondHand');
    const digitalTimeEl = document.getElementById('digitalTime');
    const digitalDateEl = document.getElementById('digitalDate');

    function updateClock() {
      const now = new Date();
      const h = now.getHours() % 12;
      const m = now.getMinutes();
      const s = now.getSeconds();
      
      hourHand.style.transform = `rotate(${h * 30 + m * 0.5}deg)`;
      minuteHand.style.transform = `rotate(${m * 6}deg)`;
      secondHand.style.transform = `rotate(${s * 6}deg)`;
      
      digitalTimeEl.textContent = now.toLocaleTimeString('fa-IR', { hour:'2-digit', minute:'2-digit' });
      digitalDateEl.textContent = new Intl.DateTimeFormat('fa-IR', { dateStyle:'full' }).format(now);
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ==================== نقل‌قول‌ها ====================
    let quoteIndex = -1;
    let remainingQuotes = [];
    function resetQuotes() {
      if (typeof quotes !== 'undefined' && Array.isArray(quotes)) {
        remainingQuotes = [...quotes].sort(() => Math.random() - 0.5);
      } else {
        remainingQuotes = [{ text: 'هر لحظه، آغازی تازه است.', author: 'ناشناس' }];
      }
      quoteIndex = 0;
    }
    function getNextQuote() {
      if (quoteIndex >= remainingQuotes.length) {
        remainingQuotes = [...remainingQuotes].sort(() => Math.random() - 0.5);
        quoteIndex = 0;
      }
      return remainingQuotes[quoteIndex++];
    }
    function showQuote() {
      const q = getNextQuote();
      document.getElementById('quoteText').textContent = q.text;
      document.getElementById('quoteAuthor').textContent = q.author && q.author !== 'ناشناس' ? `— ${q.author}` : '';
    }
    resetQuotes();
    showQuote();
    setInterval(showQuote, 60000);
    document.getElementById('nextQuoteBtn').addEventListener('click', showQuote);

    // ==================== تم‌ها ====================
    document.querySelectorAll('.theme-dot').forEach(dot => {
      dot.addEventListener('click', () => {
        document.body.setAttribute('data-theme', dot.dataset.theme === 'default' ? '' : dot.dataset.theme);
        document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
        localStorage.setItem('aeternum-theme', dot.dataset.theme);
      });
    });
    const savedTheme = localStorage.getItem('aeternum-theme');
    if (savedTheme && savedTheme !== 'default') {
      document.body.setAttribute('data-theme', savedTheme);
      document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
      document.querySelector(`[data-theme="${savedTheme}"]`).classList.add('active');
    }
  </script>
</body>
</html>
