<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AION | پنجره‌ای به کیهان</title>
  <meta name="description" content="کره زمین ۴K با پس‌زمینهٔ کیهانی زنده و ساعت هوشمند – قدرت DeepSeek">
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
  <style>
    :root {
      --bg: #010205;
      --glass: rgba(10, 12, 22, 0.45);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f0f0f5;
      --accent: #d4af37;
      --accent-glow: rgba(212, 175, 55, 0.5);
    }
    [data-theme="ice"] { --accent: #7ec8e3; --accent-glow: rgba(126,200,227,0.5); }
    [data-theme="purple"] { --accent: #b388ff; --accent-glow: rgba(179,136,255,0.5); }
    [data-theme="emerald"] { --accent: #6ee7b7; --accent-glow: rgba(110,231,183,0.5); }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Vazirmatn', sans-serif;
      background: #000;
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 1s;
    }

    /* پس‌زمینهٔ کیهانی (اسلایدشو) */
    #cosmic-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -2;
      background-size: cover;
      background-position: center;
      transition: opacity 2s ease-in-out;
      opacity: 0;
    }
    #cosmic-bg.active { opacity: 1; }

    /* کرهٔ سه‌بعدی */
    #globe-container {
      position: absolute;
      top: 0; right: 0;
      width: 65%; height: 100%;
      z-index: 0;
      cursor: grab;
    }
    #globe-container:active { cursor: grabbing; }

    /* پنل شیشه‌ای سمت چپ */
    .panel {
      position: relative;
      z-index: 10;
      width: 35%;
      min-width: 380px;
      height: 100vh;
      padding: 2rem;
      background: var(--glass);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-right: 1px solid var(--border);
      box-shadow: 20px 0 60px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      overflow-y: auto;
    }

    .logo {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--accent), #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      filter: drop-shadow(0 0 20px var(--accent-glow));
    }

    .digital-clock {
      text-align: center;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 2rem 1.5rem;
      backdrop-filter: blur(20px);
    }
    .time-main {
      font-size: 4.5rem;
      font-weight: 200;
      letter-spacing: 6px;
      color: white;
      text-shadow: 0 0 30px var(--accent-glow);
    }
    .date-main {
      font-size: 1rem;
      opacity: 0.8;
      margin-top: 0.5rem;
    }

    .mini-analog {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1rem 1.2rem;
      backdrop-filter: blur(20px);
    }
    .analog-face {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), transparent 60%);
      border: 2px solid var(--accent);
      position: relative;
      box-shadow: 0 0 20px var(--accent-glow);
      flex-shrink: 0;
    }
    .mini-hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 3px;
    }
    .mini-hour { width: 2.5px; height: 20px; background: #f8fafc; margin-left: -1.25px; }
    .mini-minute { width: 1.8px; height: 28px; background: #e2e8f0; margin-left: -0.9px; }
    .mini-second { width: 1px; height: 32px; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .mini-center {
      position: absolute; top: 50%; left: 50%;
      width: 6px; height: 6px; background: white; border-radius: 50%;
      transform: translate(-50%, -50%); z-index: 5;
    }
    .mini-label { font-size: 0.9rem; opacity: 0.7; }

    .cities-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }
    .city-chip {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.5rem 0.3rem;
      text-align: center;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }
    .city-chip:hover {
      background: rgba(255,255,255,0.08);
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .city-name { font-size: 0.7rem; opacity: 0.7; }
    .city-time { font-size: 0.95rem; font-weight: 500; }
    .business-indicator {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-right: 4px;
    }
    .business-green { background: #10b981; box-shadow: 0 0 6px #10b981; }
    .business-orange { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; }

    .quote-box {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-right: 3px solid var(--accent);
      border-radius: 16px;
      padding: 1rem 1.2rem;
      backdrop-filter: blur(15px);
    }
    .quote-text { font-style: italic; font-size: 0.9rem; line-height: 1.8; margin-bottom: 0.4rem; }
    .quote-author { font-size: 0.75rem; opacity: 0.6; text-align: left; }
    .next-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 1rem;
      border-radius: 16px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.7rem;
      margin-top: 0.5rem;
      transition: 0.3s;
    }
    .next-btn:hover { background: rgba(255,255,255,0.2); border-color: white; }

    .theme-dots {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
    }
    .theme-dot {
      width: 24px; height: 24px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent; transition: 0.3s;
    }
    .theme-dot:hover { transform: scale(1.2); border-color: white; }
    .theme-dot.active { border-color: white; transform: scale(1.2); }

    @media (max-width: 900px) {
      body { flex-direction: column; overflow-y: auto; }
      #globe-container { width: 100%; height: 45vh; position: relative; }
      .panel { width: 100%; min-width: auto; height: auto; border-right: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <!-- پس‌زمینهٔ کیهانی -->
  <div id="cosmic-bg" class="active"></div>

  <div id="globe-container"></div>

  <div class="panel">
    <div class="logo">AION</div>

    <div class="digital-clock">
      <div class="time-main" id="digitalTime">--:--</div>
      <div class="date-main" id="digitalDate">...</div>
    </div>

    <div class="mini-analog">
      <div class="analog-face" id="analogFace">
        <div class="mini-hand mini-hour" id="miniHour"></div>
        <div class="mini-hand mini-minute" id="miniMinute"></div>
        <div class="mini-hand mini-second" id="miniSecond"></div>
        <div class="mini-center"></div>
      </div>
      <div class="mini-label">ساعت ایران</div>
    </div>

    <div>
      <div style="font-size:0.8rem; opacity:0.7; margin-bottom:0.5rem;">🌍 شهرهای جهان</div>
      <div class="cities-grid" id="citiesGrid"></div>
    </div>

    <div class="quote-box">
      <div class="quote-text" id="quoteText">...</div>
      <div class="quote-author" id="quoteAuthor"></div>
      <button class="next-btn" id="nextQuoteBtn">جمله بعدی</button>
    </div>

    <div class="theme-dots">
      <span class="theme-dot active" data-theme="default" style="background:#d4af37;"></span>
      <span class="theme-dot" data-theme="ice" style="background:#7ec8e3;"></span>
      <span class="theme-dot" data-theme="purple" style="background:#b388ff;"></span>
      <span class="theme-dot" data-theme="emerald" style="background:#6ee7b7;"></span>
    </div>
  </div>

  <script src="quotes.js"></script>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // ==================== کره زمین ۴K ====================
    const container = document.getElementById('globe-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(0, 0.3, 2.8);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // Post-processing
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(container.clientWidth, container.clientHeight), 0.5, 0.4, 0.1);
    bloomPass.threshold = 0.1;
    bloomPass.strength = 0.9;
    bloomPass.radius = 0.6;
    composer.addPass(bloomPass);

    // نورپردازی
    scene.add(new THREE.AmbientLight(0x334466));
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.4);
    sunLight.position.set(5, 2, 5);
    scene.add(sunLight);

    // بافت‌ها
    const loader = new THREE.TextureLoader();
    const earthMap = loader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/2_no_clouds_4k.jpg');
    const cityLights = loader.load('https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Earth%27s_city_lights_at_night_%282002%29.jpg/1280px-Earth%27s_city_lights_at_night_%282002%29.jpg');
    const cloudMap = loader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/fair_clouds_4k.png');

    const earthGeo = new THREE.SphereGeometry(1.2, 128, 128);
    const earthMat = new THREE.MeshPhongMaterial({ map: earthMap, specular: 0x333333, shininess: 5 });
    const earth = new THREE.Mesh(earthGeo, earthMat);
    scene.add(earth);

    // شب (city lights) – لایه اضافی
    const nightGeo = new THREE.SphereGeometry(1.21, 64, 64);
    const nightMat = new THREE.MeshPhongMaterial({ map: cityLights, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.8 });
    const nightGlobe = new THREE.Mesh(nightGeo, nightMat);
    scene.add(nightGlobe);

    // ابرها
    const cloudGeo = new THREE.SphereGeometry(1.22, 64, 64);
    const cloudMat = new THREE.MeshPhongMaterial({ map: cloudMap, transparent: true, opacity: 0.45, blending: THREE.AdditiveBlending });
    const clouds = new THREE.Mesh(cloudGeo, cloudMat);
    scene.add(clouds);

    // ستاره‌ها
    const starsGeo = new THREE.BufferGeometry();
    const starsPos = new Float32Array(3000 * 3);
    for (let i = 0; i < starsPos.length; i += 3) {
      starsPos[i] = (Math.random() - 0.5) * 20;
      starsPos[i+1] = (Math.random() - 0.5) * 12;
      starsPos[i+2] = (Math.random() - 0.5) * 8;
    }
    starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
    scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.02 })));

    // حلقه‌های مداری
    function createRing(radius, color, rotationSpeed) {
      const ringGeo = new THREE.TorusGeometry(radius, 0.004, 16, 100);
      const ringMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.5 });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      ring.rotation.y = Math.random() * Math.PI;
      ring.userData = { speed: rotationSpeed };
      scene.add(ring);
      return ring;
    }
    const ring1 = createRing(1.4, 0xd4af37, 0.0004);
    const ring2 = createRing(1.5, 0x7ec8e3, -0.0003);
    const ring3 = createRing(1.6, 0xb388ff, 0.0005);

    // کنترل
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.3;
    controls.minDistance = 1.8;
    controls.maxDistance = 5;
    controls.enablePan = false;

    // حلقه انیمیشن
    function animate() {
      requestAnimationFrame(animate);
      clouds.rotation.y += 0.0002;
      nightGlobe.rotation.y += 0.0001;
      ring1.rotation.z += ring1.userData.speed;
      ring2.rotation.z += ring2.userData.speed;
      ring3.rotation.z += ring3.userData.speed;
      controls.update();
      composer.render();
    }
    animate();
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
      composer.setSize(container.clientWidth, container.clientHeight);
    });

    // ==================== پس‌زمینه کیهانی (اسلایدشو) ====================
    const cosmicBg = document.getElementById('cosmic-bg');
    const spaceImages = [
      'https://www.nasa.gov/wp-content/uploads/2023/03/pillars_of_creation.jpg',
      'https://www.nasa.gov/wp-content/uploads/2023/06/orion_nebula.jpg',
      'https://www.nasa.gov/wp-content/uploads/2023/01/hubble_deep_field.jpg',
      'https://www.nasa.gov/wp-content/uploads/2022/07/james_webb_carina_nebula.jpg',
      'https://www.nasa.gov/wp-content/uploads/2021/06/milky_way_center.jpg'
    ];
    let currentBgIndex = 0;
    function changeBackground() {
      currentBgIndex = (currentBgIndex + 1) % spaceImages.length;
      cosmicBg.style.opacity = '0';
      setTimeout(() => {
        cosmicBg.style.backgroundImage = `url('${spaceImages[currentBgIndex]}')`;
        cosmicBg.style.opacity = '1';
      }, 1000);
    }
    // شروع با اولین تصویر
    cosmicBg.style.backgroundImage = `url('${spaceImages[0]}')`;
    cosmicBg.style.opacity = '1';
    setInterval(changeBackground, 20000);

    // ==================== ساعت هوشمند ====================
    function updateClock() {
      const now = new Date();
      document.getElementById('digitalTime').textContent = now.toLocaleTimeString('fa-IR', { hour:'2-digit', minute:'2-digit' });
      document.getElementById('digitalDate').textContent = new Intl.DateTimeFormat('fa-IR', { dateStyle:'full' }).format(now);
      const h = now.getHours() % 12;
      const m = now.getMinutes();
      const s = now.getSeconds();
      document.getElementById('miniHour').style.transform = `rotate(${h*30 + m*0.5}deg)`;
      document.getElementById('miniMinute').style.transform = `rotate(${m*6}deg)`;
      document.getElementById('miniSecond').style.transform = `rotate(${s*6}deg)`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ==================== شهرهای جهان + ساعات اداری ====================
    const worldCities = [
      { name:'تهران', tz:'Asia/Tehran' },
      { name:'لندن', tz:'Europe/London' },
      { name:'نیویورک', tz:'America/New_York' },
      { name:'توکیو', tz:'Asia/Tokyo' },
      { name:'دبی', tz:'Asia/Dubai' },
      { name:'پاریس', tz:'Europe/Paris' },
      { name:'برلین', tz:'Europe/Berlin' },
      { name:'مسکو', tz:'Europe/Moscow' },
      { name:'سیدنی', tz:'Australia/Sydney' },
      { name:'تورنتو', tz:'America/Toronto' },
      { name:'بمبئی', tz:'Asia/Kolkata' },
      { name:'شانگهای', tz:'Asia/Shanghai' }
    ];

    function updateWorldCities() {
      const now = new Date();
      document.getElementById('citiesGrid').innerHTML = worldCities.map(c => {
        const cityTime = new Date(now.toLocaleString('en-US', { timeZone: c.tz }));
        const hour = cityTime.getHours();
        const isBusiness = hour >= 9 && hour < 17;
        const cls = isBusiness ? 'business-green' : 'business-orange';
        return `
          <div class="city-chip">
            <div class="city-name">${c.name}</div>
            <div class="city-time"><span class="business-indicator ${cls}"></span>${cityTime.toLocaleTimeString('fa-IR', { hour:'2-digit', minute:'2-digit' })}</div>
          </div>
        `;
      }).join('');
    }
    updateWorldCities();
    setInterval(updateWorldCities, 60000);

    // ==================== نقل‌قول‌ها ====================
    let quoteIndex = -1;
    let remainingQuotes = [];
    function resetQuotes() {
      if (typeof quotes !== 'undefined' && Array.isArray(quotes)) {
        remainingQuotes = [...quotes].sort(() => Math.random() - 0.5);
      } else {
        remainingQuotes = [{ text:'هر لحظه، آغازی تازه است.', author:'ناشناس' }];
      }
      quoteIndex = 0;
    }
    function getNextQuote() {
      if (quoteIndex >= remainingQuotes.length) {
        remainingQuotes = [...remainingQuotes].sort(() => Math.random() - 0.5);
        quoteIndex = 0;
      }
      return remainingQuotes[quoteIndex++];
    }
    function showQuote() {
      const q = getNextQuote();
      document.getElementById('quoteText').textContent = q.text;
      document.getElementById('quoteAuthor').textContent = q.author && q.author !== 'ناشناس' ? `— ${q.author}` : '';
    }
    resetQuotes();
    showQuote();
    setInterval(showQuote, 60000);
    document.getElementById('nextQuoteBtn').addEventListener('click', showQuote);

    // ==================== تم‌ها ====================
    document.querySelectorAll('.theme-dot').forEach(dot => {
      dot.addEventListener('click', () => {
        document.body.setAttribute('data-theme', dot.dataset.theme === 'default' ? '' : dot.dataset.theme);
        document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
        localStorage.setItem('aion-theme', dot.dataset.theme);
      });
    });
    const saved = localStorage.getItem('aion-theme');
    if (saved && saved !== 'default') {
      document.body.setAttribute('data-theme', saved);
      document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
      document.querySelector(`[data-theme="${saved}"]`).classList.add('active');
    }
  </script>
</body>
</html>
