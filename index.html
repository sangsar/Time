<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOOD TIME | ساعت لوکس جهانی</title>
  <meta name="description" content="ساعت لوکس جهانی با طراحی منحصربه‌فرد – زمان را هنرمندانه ببینید">
  <meta property="og:title" content="GOOD TIME | ساعت لوکس جهانی">
  <meta property="og:description" content="یک تجربهٔ ناب از زمان">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "GOOD TIME",
    "applicationCategory": "Lifestyle",
    "description": "ساعت لوکس جهانی با طراحی هنری و نمایش زمان شهرهای مختلف"
  }
  </script>
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --glass: rgba(20, 20, 28, 0.5);
      --border: rgba(212, 175, 55, 0.3);
      --text: #e0d5c0;
      --accent: #d4af37;
      --accent-glow: rgba(212, 175, 55, 0.7);
    }
    [data-theme="ice"] { --accent: #7ec8e3; --border: rgba(126,200,227,0.4); --accent-glow: rgba(126,200,227,0.7); }
    [data-theme="emerald"] { --accent: #6ee7b7; --border: rgba(110,231,183,0.4); --accent-glow: rgba(110,231,183,0.7); }
    [data-theme="rose"] { --accent: #fb7185; --border: rgba(251,113,133,0.4); --accent-glow: rgba(251,113,133,0.7); }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Vazirmatn', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* پس‌زمینهٔ ذرات (Canvas) */
    #particlesCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* محتوا */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      width: 100%;
      max-width: 600px;
      padding: 1rem;
    }

    /* لوگو */
    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 6px;
      background: linear-gradient(180deg, var(--accent) 0%, #fff 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px var(--accent-glow);
    }

    /* حلقهٔ شهرها + ساعت مرکزی */
    .clock-container {
      position: relative;
      width: 320px;
      height: 320px;
      margin: 1rem auto;
    }

    canvas#mainClock {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px var(--accent-glow));
    }

    /* شهرهای دور حلقه */
    .city-ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      pointer-events: auto;
    }
    .city-node {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: 0.3s;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    .city-node:hover {
      background: rgba(255,255,255,0.1);
      border-color: var(--accent);
      box-shadow: 0 0 25px var(--accent-glow);
    }
    .city-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }
    .city-dot.night {
      background: #3b5998;
      box-shadow: 0 0 10px rgba(59,89,152,0.7);
    }

    /* برچسب شهر */
    .city-label {
      position: absolute;
      white-space: nowrap;
      font-size: 0.7rem;
      transform: translate(-50%, 20px);
      opacity: 0.8;
      pointer-events: none;
    }

    /* ساعت دیجیتال ایران */
    .iran-time {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 2px;
      text-shadow: 0 0 15px var(--accent-glow);
    }
    .iran-date {
      font-size: 0.8rem;
      opacity: 0.8;
    }

    /* نقل‌قول */
    .quote-box {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1rem 1.5rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .quote-text { font-style: italic; font-size: 0.9rem; line-height: 1.7; }
    .quote-author { font-size: 0.7rem; opacity: 0.6; margin-top: 0.5rem; }
    .next-quote-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.3rem 1rem;
      border-radius: 15px;
      margin-top: 0.5rem;
      cursor: pointer;
      font-family: inherit;
      transition: 0.3s;
    }
    .next-quote-btn:hover { background: rgba(255,255,255,0.1); }

    /* مدال جزئیات شهر */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(15px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.4s;
    }
    .modal.active { opacity: 1; pointer-events: auto; }
    .modal-card {
      background: var(--glass);
      backdrop-filter: blur(30px);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 2rem;
      text-align: center;
      width: 280px;
    }
    .modal-city { font-size: 1.8rem; margin-bottom: 1rem; }
    canvas#modalClock { width: 130px; height: 130px; }
    .modal-time { font-size: 2rem; margin: 0.5rem 0; }
    .modal-date { opacity: 0.8; font-size: 0.8rem; }
    .modal-close {
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 1.2rem;
      border-radius: 20px;
      margin-top: 1rem;
      cursor: pointer;
      font-family: inherit;
    }

    /* دکمهٔ تغییر تم */
    .theme-toggle {
      position: fixed;
      top: 1rem; right: 1rem;
      z-index: 50;
      background: var(--glass);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

  <canvas id="particlesCanvas"></canvas>

  <div class="content">
    <div class="logo">GOOD TIME</div>

    <div class="clock-container" id="clockContainer">
      <canvas id="mainClock" width="320" height="320"></canvas>
      <!-- داینامیک: شهرها اینجا با JS اضافه می‌شوند -->
    </div>

    <div class="iran-time" id="iranDigital">--:--</div>
    <div class="iran-date" id="iranDate">...</div>

    <div class="quote-box">
      <div class="quote-text" id="quoteText">...</div>
      <div class="quote-author" id="quoteAuthor"></div>
      <button class="next-quote-btn" id="nextQuoteBtn">جمله بعدی</button>
    </div>
  </div>

  <!-- مدال شهر -->
  <div class="modal" id="cityModal">
    <div class="modal-card">
      <div class="modal-city" id="modalCityName"></div>
      <canvas id="modalClock" width="130" height="130"></canvas>
      <div class="modal-time" id="modalTime"></div>
      <div class="modal-date" id="modalDate"></div>
      <button class="modal-close" id="modalClose">بستن</button>
    </div>
  </div>

  <button class="theme-toggle" id="themeToggle">🎨</button>

  <script src="quotes.js"></script>
  <script>
    // ==================== پس‌زمینهٔ ذرات ====================
    const pCanvas = document.getElementById('particlesCanvas');
    const pCtx = pCanvas.getContext('2d');
    pCanvas.width = window.innerWidth;
    pCanvas.height = window.innerHeight;
    const particles = [];
    for (let i = 0; i < 200; i++) {
      particles.push({
        x: Math.random() * pCanvas.width,
        y: Math.random() * pCanvas.height,
        r: Math.random() * 1.5 + 0.5,
        speedX: (Math.random() - 0.5) * 0.5,
        speedY: (Math.random() - 0.5) * 0.5,
        opacity: Math.random() * 0.8 + 0.2
      });
    }
    function animateParticles() {
      pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
      particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;
        if (p.x < 0) p.x = pCanvas.width;
        if (p.x > pCanvas.width) p.x = 0;
        if (p.y < 0) p.y = pCanvas.height;
        if (p.y > pCanvas.height) p.y = 0;
        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.r, 0, 2*Math.PI);
        pCtx.fillStyle = `rgba(255,255,255,${p.opacity})`;
        pCtx.fill();
      });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();
    window.addEventListener('resize', () => {
      pCanvas.width = window.innerWidth;
      pCanvas.height = window.innerHeight;
    });

    // ==================== داده‌های شهرها ====================
    const cities = [
      { name: 'تهران', tz: 'Asia/Tehran' },
      { name: 'لندن', tz: 'Europe/London' },
      { name: 'نیویورک', tz: 'America/New_York' },
      { name: 'توکیو', tz: 'Asia/Tokyo' },
      { name: 'دبی', tz: 'Asia/Dubai' },
      { name: 'پاریس', tz: 'Europe/Paris' },
      { name: 'برلین', tz: 'Europe/Berlin' },
      { name: 'مسکو', tz: 'Europe/Moscow' },
      { name: 'سیدنی', tz: 'Australia/Sydney' },
      { name: 'تورنتو', tz: 'America/Toronto' },
      { name: 'بمبئی', tz: 'Asia/Kolkata' },
      { name: 'شانگهای', tz: 'Asia/Shanghai' }
    ];

    // ==================== رسم ساعت اصلی (Canvas) ====================
    const mainCanvas = document.getElementById('mainClock');
    const mainCtx = mainCanvas.getContext('2d');
    const clockRadius = 140;
    const centerX = 160, centerY = 160;

    function drawClockFace(ctx, now, isModal = false) {
      const r = isModal ? 60 : clockRadius;
      const cx = isModal ? 65 : centerX;
      const cy = isModal ? 65 : centerY;
      ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
      
      // حلقهٔ بیرونی
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2*Math.PI);
      ctx.strokeStyle = 'rgba(212,175,55,0.4)';
      ctx.lineWidth = isModal ? 2 : 3;
      ctx.stroke();
      
      // اعداد رومی ساده (فقط خطوط)
      for (let i = 0; i < 12; i++) {
        const angle = (i * 30 - 90) * Math.PI / 180;
        const outerX = cx + (r - 15) * Math.cos(angle);
        const outerY = cy + (r - 15) * Math.sin(angle);
        const innerX = cx + (r - 25) * Math.cos(angle);
        const innerY = cy + (r - 25) * Math.sin(angle);
        ctx.beginPath();
        ctx.moveTo(innerX, innerY);
        ctx.lineTo(outerX, outerY);
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = isModal ? 1.5 : 2;
        ctx.stroke();
      }

      const h = now.getHours() % 12;
      const m = now.getMinutes();
      const s = now.getSeconds();
      
      // عقربه‌ها
      function drawHand(angle, length, width, color, glow = false) {
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        const rad = (angle * Math.PI / 180) - (Math.PI / 2);
        ctx.lineTo(cx + length * Math.cos(rad), cy + length * Math.sin(rad));
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        if (glow) {
          ctx.shadowColor = color;
          ctx.shadowBlur = 8;
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      
      drawHand((h * 30) + (m * 0.5), r * 0.5, 4, '#f8fafc');
      drawHand(m * 6, r * 0.7, 2.5, '#e2e8f0');
      drawHand(s * 6, r * 0.8, 1, '#d4af37', true);
      
      // نقطهٔ مرکز
      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, 2*Math.PI);
      ctx.fillStyle = '#d4af37';
      ctx.fill();
    }

    function updateMainClock() {
      const now = new Date();
      drawClockFace(mainCtx, now);
      document.getElementById('iranDigital').textContent = now.toLocaleTimeString('fa-IR', { hour:'2-digit', minute:'2-digit' });
      document.getElementById('iranDate').textContent = new Intl.DateTimeFormat('fa-IR', { dateStyle:'full' }).format(now);
    }
    updateMainClock();
    setInterval(updateMainClock, 1000);

    // ==================== حلقهٔ شهرها ====================
    const container = document.getElementById('clockContainer');
    const ringRadius = 130; // فاصلهٔ مرکز تا شهرها
    cities.forEach((city, i) => {
      const angle = (i * 30 - 90) * Math.PI / 180; // هر شهر ۳۰ درجه فاصله
      const x = 160 + ringRadius * Math.cos(angle);
      const y = 160 + ringRadius * Math.sin(angle);
      
      const node = document.createElement('div');
      node.className = 'city-node';
      node.style.left = x + 'px';
      node.style.top = y + 'px';
      node.innerHTML = '<div class="city-dot"></div>';
      node.addEventListener('click', () => showCityModal(city));
      
      const label = document.createElement('div');
      label.className = 'city-label';
      label.style.left = x + 'px';
      label.style.top = y + 'px';
      label.textContent = city.name;
      
      container.appendChild(node);
      container.appendChild(label);
      
      // به‌روزرسانی رنگ نقطه بر اساس روز/شب
      setInterval(() => {
        const now = new Date();
        const cityTime = new Date(now.toLocaleString('en-US', { timeZone: city.tz }));
        const hour = cityTime.getHours();
        const dot = node.querySelector('.city-dot');
        if (hour >= 6 && hour < 18) {
          dot.classList.remove('night');
        } else {
          dot.classList.add('night');
        }
      }, 60000);
      // اجرای اولیه
      (function() {
        const now = new Date();
        const cityTime = new Date(now.toLocaleString('en-US', { timeZone: city.tz }));
        const hour = cityTime.getHours();
        const dot = node.querySelector('.city-dot');
        if (hour >= 6 && hour < 18) {
          dot.classList.remove('night');
        } else {
          dot.classList.add('night');
        }
      })();
    });

    // ==================== مدال شهر ====================
    const modal = document.getElementById('cityModal');
    const modalClose = document.getElementById('modalClose');
    let modalInterval;

    function showCityModal(city) {
      document.getElementById('modalCityName').textContent = city.name;
      modal.classList.add('active');
      function updateModal() {
        const now = new Date();
        const cityTime = new Date(now.toLocaleString('en-US', { timeZone: city.tz }));
        document.getElementById('modalTime').textContent = cityTime.toLocaleTimeString('fa-IR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        document.getElementById('modalDate').textContent = 
          new Intl.DateTimeFormat('fa-IR', { dateStyle:'full' }).format(cityTime) + ' | ' +
          cityTime.toLocaleDateString('en-US', { dateStyle:'full' });
        drawClockFace(document.getElementById('modalClock').getContext('2d'), cityTime, true);
      }
      updateModal();
      modalInterval = setInterval(updateModal, 1000);
    }

    function closeModal() {
      modal.classList.remove('active');
      clearInterval(modalInterval);
    }
    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    // ==================== نقل‌قول‌ها ====================
    let quoteIndex = -1, remainingQuotes = [];
    function resetQuotes() {
      if (typeof quotes !== 'undefined' && Array.isArray(quotes)) {
        remainingQuotes = [...quotes].sort(() => Math.random() - 0.5);
      } else {
        remainingQuotes = [{ text:'هر لحظه، آغازی تازه است.', author:'ناشناس' }];
      }
      quoteIndex = 0;
    }
    function getNextQuote() {
      if (quoteIndex >= remainingQuotes.length) {
        remainingQuotes = [...remainingQuotes].sort(() => Math.random() - 0.5);
        quoteIndex = 0;
      }
      return remainingQuotes[quoteIndex++];
    }
    function showQuote() {
      const q = getNextQuote();
      document.getElementById('quoteText').textContent = q.text;
      document.getElementById('quoteAuthor').textContent = q.author && q.author !== 'ناشناس' ? `— ${q.author}` : '';
    }
    resetQuotes();
    showQuote();
    setInterval(showQuote, 60000);
    document.getElementById('nextQuoteBtn').addEventListener('click', showQuote);

    // ==================== تغییر تم ====================
    const themes = ['default', 'ice', 'emerald', 'rose'];
    let currentTheme = localStorage.getItem('goodtime-theme') || 'default';
    function setTheme(t) {
      document.body.setAttribute('data-theme', t === 'default' ? '' : t);
      localStorage.setItem('goodtime-theme', t);
    }
    setTheme(currentTheme);
    document.getElementById('themeToggle').addEventListener('click', () => {
      const idx = themes.indexOf(currentTheme);
      currentTheme = themes[(idx + 1) % themes.length];
      setTheme(currentTheme);
    });
  </script>
</body>
</html>
